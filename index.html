<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Qwen AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #7c3aed;
  --primary-light: #a78bfa;
  --bg: #0a0a0f;
  --surface: #12121a;
  --card: #1a1a25;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5;
  --text-muted: #8a8a9a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; overflow: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}
#app { display: flex; flex-direction: column; height: 100vh; height: calc(var(--vh, 1vh) * 100); }
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px; }
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
}
.msg-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 15px; }
.msg.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--card); border: 1px solid var(--border); color: var(--text); }
.welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
.welcome h1 { font-size: 28px; font-weight: 600; margin-bottom: 12px; background: linear-gradient(135deg, var(--text), var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.welcome p { color: var(--text-muted); font-size: 15px; max-width: 300px; }
.quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 24px; width: 100%; max-width: 320px; }
.quick-btn { padding: 12px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 13px; cursor: pointer; }
.quick-btn:active { background: var(--surface); }
.input-bar { display: flex; gap: 8px; padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); background: var(--surface); border-top: 1px solid var(--border); }
.msg-input {
  flex: 1; padding: 12px 16px; border-radius: 24px; background: var(--card);
  border: 1px solid var(--border); color: var(--text); font-size: 15px; outline: none; min-height: 44px; max-height: 120px; resize: none;
}
.send-btn { width: 44px; height: 44px; border-radius: 22px; background: var(--primary); border: none; color: white; font-size: 18px; cursor: pointer; }
.send-btn:disabled { opacity: 0.5; }
.typing { display: flex; align-items: center; gap: 6px; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; align-self: flex-start; border-bottom-left-radius: 4px; }
.typing .dot { width: 8px; height: 8px; background: var(--primary-light); border-radius: 50%; animation: bounce 1s infinite; }
.typing .dot:nth-child(2) { animation-delay: 0.2s; }
.typing .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: 260px; background: var(--surface);
  transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; border-right: 1px solid var(--border);
}
.sidebar.open { transform: translateX(0); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: opacity 0.3s; z-index: 99; }
.overlay.active { opacity: 1; visibility: visible; }
.settings { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
.settings.open { display: flex; }
.settings-panel { background: var(--surface); border-radius: 20px; padding: 24px; width: 90%; max-width: 340px; border: 1px solid var(--border); }
</style>
</head>
<body>
<div id="app">
  <header>
    <button id="menuBtn" onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;width:40px;height:40px;">☰</button>
    <div class="logo"><div class="logo-icon">Q</div><span>Qwen</span></div>
    <button id="settingsBtn" onclick="toggleSettings()" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;width:40px;height:40px;">⚙</button>
  </header>
  
  <div class="sidebar" id="sidebar">
    <div style="padding:20px 16px;border-bottom:1px solid var(--border);font-weight:600;">Qwen AI</div>
    <button id="newChatBtn" onclick="clearChat()" style="margin:16px;background:var(--primary);color:white;border:none;padding:12px;border-radius:16px;font-weight:500;cursor:pointer;">+ Nouvelle discussion</button>
    <div id="convList" style="flex:1;overflow-y:auto;padding:8px;"></div>
  </div>
  
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  
  <div class="welcome" id="welcome">
    <h1>Bonjour 👋</h1>
    <p>Comment puis-je vous aider aujourd'hui ?</p>
    <div class="quick-grid" id="quickGrid">
      <button class="quick-btn" onclick="sendQuick('Code Python pour tri')">💻 Code</button>
      <button class="quick-btn" onclick="sendQuick('Expliquer ML')">🧠 Expliquer</button>
      <button class="quick-btn" onclick="sendQuick('Traduire en anglais')">🌍 Traduire</button>
      <button class="quick-btn" onclick="sendQuick('Écrire un poème')">📝 Poème</button>
    </div>
  </div>
  
  <div class="msg-list" id="messages"></div>
  
  <div class="input-bar">
    <textarea id="msgInput" class="msg-input" placeholder="Message..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="settings" id="settings">
  <div class="settings-panel">
    <h2 style="font-size:18px;margin-bottom:20px;">Paramètres</h2>
    <div style="margin-bottom:16px;">
      <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;">Modèle</label>
      <select id="modelSelect" style="width:100%;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);">
        <option value="qwen3-max">Qwen3 Max</option>
        <option value="qwen3.7-max">Qwen3 7B Max</option>
      </select>
    </div>
    <button onclick="closeSettings()" style="width:100%;padding:12px;background:var(--primary);border:none;border-radius:12px;color:white;font-weight:500;cursor:pointer;margin-top:8px;">Fermer</button>
  </div>
</div>

<script>
const API_URL='https://api.mulerouter.ai/vendors/openai/v1/chat/completions';
const API_KEY='sk-mr-a32a7cf0ae2b1ef610f64c038429b9b6ea4a5575312c8e8899576ce39e446f1d';
let messages=[], selectedModel='qwen3-max', isLoading=false, userName='';

function getGreeting() {
  const h = new Date().getHours();
  if(h < 6) return 'Bonne nuit';
  if(h < 12) return 'Bonjour';
  if(h < 18) return 'Bon après-midi';
  return 'Bonsoir';
}

function updateWelcome() {
  const h1 = document.querySelector('#welcome h1');
  h1.textContent = userName ? `${getGreeting()} ${userName} 👋` : `${getGreeting()} 👋`;
}

function getLocalTimeInfo() {
  const now = new Date();
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  return `Heure: ${now.toLocaleTimeString('fr-FR')}, Timezone: ${tz}`;
}

function getSystemPrompt() {
  return `Tu es Qwen AI, un assistant IA. Réponds en français de manière naturelle. ${getLocalTimeInfo()}`;
}

async function getAIResponse(msg) {
  const msgs = [{role:'system', content:getSystemPrompt()}, ...messages.map(m=>({role:m.role, content:m.content})), {role:'user', content:msg}];
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
    body:JSON.stringify({model:selectedModel, messages:msgs, temperature:0.7, max_tokens:1000})
  });
  if(!r.ok) throw new Error(r.status);
  const d = await r.json();
  return d.choices[0].message.content.replace(/\*\*/g,'').replace(/\*/g,'');
}

function addMessage(text, role) {
  messages.push({role, content:text});
  const c = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text.replace(/\n/g,'<br>');
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function hideWelcome() {
  document.getElementById('welcome').style.display = 'none';
}

function showTyping() {
  const c = document.getElementById('messages');
  const b = document.createElement('div');
  b.className = 'typing';
  b.id = 'typing';
  b.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  c.appendChild(b);
  c.scrollTop = c.scrollHeight;
}

function hideTyping() {
  const b = document.getElementById('typing');
  if(b) b.remove();
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('sendBtn').disabled = v;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  hideWelcome();
  addMessage(text, 'user');
  setLoading(true);
  showTyping();
  
  try {
    const response = await getAIResponse(text);
    hideTyping();
    addMessage(response, 'assistant');
  } catch(e) {
    hideTyping();
    addMessage('Erreur: ' + e.message, 'assistant');
  }
  setLoading(false);
}

function sendQuick(t) {
  document.getElementById('msgInput').value = t;
  sendMessage();
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  autoResize(e.target);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
}

function saveName(name) {
  if(name && name.trim()) {
    userName = name.trim();
    localStorage.setItem('qwen_name', userName);
    updateWelcome();
  }
}

function closeSettings() {
  document.getElementById('settings').classList.remove('open');
}

function clearChat() {
  closeSidebar();
  messages = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').style.display = 'flex';
  document.getElementById('msgInput').focus();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modelSelect').value = selectedModel;
  userName = localStorage.getItem('qwen_name') || '';
  updateWelcome();
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
});

function askName() {
  const name = prompt('Comment vous appelez-vous ?');
  if(name) saveName(name);
}

setTimeout(askName, 500);
</script>
</body>
</html>
