<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qwen AI - Assistant Intelligent</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Code Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --ai-bubble: #ffffff;
            --user-bubble: #6366f1;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10 and IE 11 */
            user-select: none; /* Standard syntax */
        }

        input, textarea {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll, use container scroll */
            touch-action: manipulation; /* Disable double-tap zoom */
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary-color);
        }

        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .settings-btn:hover {
            color: var(--primary-color);
        }

        .main-container {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Custom Scrollbar */
        #chat-container::-webkit-scrollbar {
            width: 6px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .user-wrapper {
            align-self: flex-end;
        }

        .ai-wrapper {
            align-self: flex-start;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .user-message {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: var(--ai-bubble);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .ai-message pre {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            overflow-x: auto;
        }

        .ai-message code {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
        }

        .input-area {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
            margin-top: 10px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        #user-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
            padding: 5px;
        }

        .send-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        .send-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 5px 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Modal Settings */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            border: none;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: #f1f5f9; color: var(--text-main); }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .main-container { padding: 10px; }
            .message-wrapper { max-width: 95%; }
            header { padding: 0.75rem 1rem; }
            .logo { font-size: 1.1rem; }
            .message { font-size: 0.9rem; padding: 10px 14px; }
            .input-area { padding: 10px; border-radius: 15px; }
            .send-btn { padding: 8px 14px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span>🤖</span> Qwen AI
        </div>
        <button class="settings-btn" onclick="toggleModal(true)">⚙️</button>
    </header>

    <div class="main-container">
        <div id="chat-container">
            <div class="message-wrapper ai-wrapper">
                <div class="message ai-message">
                    Bonjour ! Je suis Qwen AI. Comment puis-je vous aider aujourd'hui ?
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Écrivez votre message ici..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">Envoyer</button>
        </div>
    </div>

    <footer>
        Développé par tom_visionai_pro • Propulsé par MuleRouter
    </footer>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Paramètres API</div>
            <div class="form-group">
                <label for="api-key">Clé API MuleRouter</label>
                <input type="password" id="api-key" placeholder="sk-...">
                <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 5px;">
                    Obtenez votre clé sur <a href="https://mulerouter.ai/" target="_blank">mulerouter.ai</a>
                </p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="toggleModal(false)">Annuler</button>
                <button class="btn btn-primary" onclick="saveSettings()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const apiKeyInput = document.getElementById('api-key');

        // Default API Key (Obfuscated)
        const _0x4f2e = "c2stbXItYTMyYTdjZjBhZTJiMWVmNjEwZjY0YzAzODQyOWI5YjZlYTRhNTU3NTMxMmM4ZTg4OTk1NzZjZTM5ZTQ0NmYxZA==";
        const DEFAULT_KEY = atob(_0x4f2e);

        // Chat history
        let chatHistory = [
            { role: 'system', content: 'Tu es Qwen AI, un assistant intelligent et utile.' }
        ];

        // Load API key from localStorage
        let MULE_API_KEY = localStorage.getItem('mule_api_key') || DEFAULT_KEY;
        if (MULE_API_KEY !== DEFAULT_KEY) apiKeyInput.value = MULE_API_KEY;

        function toggleModal(show) {
            document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
        }

        function saveSettings() {
            MULE_API_KEY = apiKeyInput.value.trim();
            localStorage.setItem('mule_api_key', MULE_API_KEY);
            toggleModal(false);
            if (MULE_API_KEY) {
                alert('Clé API enregistrée !');
            }
        }

        function addMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isUser ? 'user-wrapper' : 'ai-wrapper'}`;

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;

            if (isUser) {
                messageDiv.textContent = text;
                chatHistory.push({ role: 'user', content: text });
            } else {
                // Markdown rendering for AI with sanitization
                const rawHtml = marked.parse(text);
                messageDiv.innerHTML = DOMPurify.sanitize(rawHtml);

                // Syntax highlighting
                messageDiv.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
                chatHistory.push({ role: 'assistant', content: text });
            }

            wrapper.appendChild(messageDiv);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            if (!MULE_API_KEY) {
                alert("Veuillez configurer votre clé API MuleRouter dans les paramètres (⚙️).");
                toggleModal(true);
                return;
            }

            addMessage(message, true);
            userInput.value = '';
            setLoading(true);

            let wrapper, messageDiv;
            try {
                // Create a placeholder for the AI response
                wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper ai-wrapper';
                messageDiv = document.createElement('div');
                messageDiv.className = 'message ai-message';
                messageDiv.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
                wrapper.appendChild(messageDiv);
                chatContainer.appendChild(wrapper);
                chatContainer.scrollTop = chatContainer.scrollHeight;

                const response = await fetch('https://api.mulerouter.ai/vendors/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${MULE_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'qwen3-max',
                        messages: chatHistory
                    })
                });

                const data = await response.json();
                chatContainer.removeChild(wrapper);

                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content);
                } else {
                    addMessage("Erreur: " + (data.error?.message || "Impossible de récupérer la réponse."));
                }

            } catch (error) {
                console.error(error);
                if (wrapper && wrapper.parentNode) chatContainer.removeChild(wrapper);
                addMessage("Désolé, une erreur réseau est survenue.");
            } finally {
                setLoading(false);
            }
        }

        function setLoading(loading) {
            sendBtn.disabled = loading;
            userInput.disabled = loading;
            if (!loading) userInput.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Initial focus
        userInput.focus();

        // Prevent context menu
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Prevent keyboard shortcuts for copying
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'a' || e.key === 'u' || e.key === 's')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
