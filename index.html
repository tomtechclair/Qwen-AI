<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Qwen AI – Assistant Intelligent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --card: #1a1a25;
  --hover: #222235;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f5;
  --muted: #6b6b80;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --accent-dim: rgba(124,58,237,0.15);
  --success: #10b981;
  --error: #ef4444;
  --radius: 16px;
  --shadow: 0 4px 30px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* Mobile Check */
@media (max-width: 768px) {
  body { display: none; }
  body::before {
    content: '🔧 Mode Maintenance\n\nLe site est en maintenance sur mobile.\nRevenez à partir du jeudi 4 juin à 20H.';
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    white-space: pre;
    font-size: 18px;
    padding: 20px;
  }
}
/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  font-weight: 700;
}
.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), #ec4899);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.header-actions {
  display: flex;
  gap: 12px;
}
.icon-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.icon-btn:hover {
  background: var(--hover);
  color: var(--text);
  border-color: var(--accent);
}
.icon-btn.active {
  background: var(--accent-dim);
  color: var(--accent-light);
  border-color: var(--accent);
}
/* Main Layout */
.main-container {
  display: flex;
  flex: 1;
  overflow: hidden;
}
/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
}
.sidebar-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 0 8px;
}
.new-chat-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  border: none;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}
.new-chat-btn:hover {
  background: #6d28d9;
  transform: translateY(-1px);
}
.conv-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.conv-item {
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.conv-item:hover {
  background: var(--hover);
  color: var(--text);
}
.conv-item.active {
  background: var(--accent-dim);
  color: var(--accent-light);
}
/* Chat Area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
  padding: 0 20px;
}
/* Welcome */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}
.welcome h1 {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.welcome p {
  color: var(--muted);
  font-size: 16px;
  max-width: 500px;
}
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 30px;
}
.quick-btn {
  padding: 12px 20px;
  border-radius: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.quick-btn:hover {
  background: var(--hover);
  border-color: var(--accent);
  transform: translateY(-2px);
}
/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.msg {
  max-width: 700px;
  padding: 16px 20px;
  border-radius: 16px;
  line-height: 1.6;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.assistant pre {
  background: var(--surface);
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 12px 0;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
}
.msg.assistant code {
  background: var(--surface);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
}
/* Input Area */
.input-area {
  padding: 16px 0 24px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.msg-input {
  flex: 1;
  padding: 16px 20px;
  border-radius: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  resize: none;
  min-height: 56px;
  max-height: 200px;
  outline: none;
  transition: border-color 0.2s;
}
.msg-input:focus {
  border-color: var(--accent);
}
.msg-input::placeholder {
  color: var(--muted);
}
.send-btn {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--accent);
  border: none;
  color: white;
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.send-btn:hover {
  background: #6d28d9;
  transform: scale(1.05);
}
.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
/* Status Bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  font-size: 12px;
  color: var(--muted);
  gap: 8px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
}
.status-dot.loading {
  background: var(--accent);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
/* Model Select */
.model-select {
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.model-select:focus {
  border-color: var(--accent);
}
/* Loading dots */
.loading-dots {
  display: inline-flex;
  gap: 4px;
}
.loading-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.4s infinite ease-in-out;
}
.loading-dots span:nth-child(1) { animation-delay: 0s; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">Q</div>
    <span>Qwen AI</span>
  </div>
  <div class="header-actions">
    <select class="model-select" id="modelSelect" onchange="changeModel(this.value)">
      <option value="qwen-flash">Qwen Flash</option>
      <option value="qwen-turbo">Qwen Turbo</option>
      <option value="qwen-plus">Qwen Plus</option>
      <option value="qwen-max">Qwen Max</option>
    </select>
    <button class="icon-btn" onclick="toggleSettings()" title="Paramètres">⚙️</button>
    <button class="icon-btn" onclick="clearChat()" title="Nouvelle discussion">✨</button>
  </div>
</header>

<div class="main-container">
  <div class="sidebar">
    <button class="new-chat-btn" onclick="clearChat()">✨ Nouvelle discussion</button>
    <div class="sidebar-title">Conversations récentes</div>
    <div class="conv-list" id="convList"></div>
  </div>

  <div class="chat-area">
    <div class="welcome" id="welcome">
      <h1>Bienvenue sur Qwen AI</h1>
      <p>Votre assistant intelligent. Posez vos questions, demandez du code, des traductions, ou juste une conversation !</p>
      <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('Écris du code Python pour une fonction de tri')">💻 Code</button>
        <button class="quick-btn" onclick="sendQuick('Explique le machine learning en termes simples')">🧠 Expliquer</button>
        <button class="quick-btn" onclick="sendQuick('Traduis en anglais:')">🌍 Traduire</button>
        <button class="quick-btn" onclick="sendQuick('Écris un poème sur la nuit')">📝 Poème</button>
        <button class="quick-btn" onclick="sendQuick('Donne-moi des idées pour un projet')">💡 Idées</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea class="msg-input" id="msgInput" placeholder="Posez votre question..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusTxt">Propulsé par Qwen Flash</span>
    </div>
  </div>
</div>

<script>
// === CONFIG ===
const API_URL = 'https://dash.qwen.ai/api/v1/chat/completions';
const API_KEY = 'sk-mr-a32a7cf0ae2b1ef610f64c038429b9b6ea4a5575312c8e8899576ce39e446f1d';
const SYSTEM_PROMPT = 'Tu es Qwen AI, un assistant intelligent créé par Qwen_Pro. Tu tappelles Qwen AI, pas Qwen. Réponds de façon naturelle et conversationnelle en français. Annonce ce que tu fais, utilise des phrases courtes et fluides.';

// === STATE ===
let messages = [];
let selectedModel = 'qwen-flash';
let isLoading = false;

// === INIT ===
document.addEventListener('DOMContentLoaded', () => {
  autoResize(document.getElementById('msgInput'));
  updateStatus('ready', 'Propulsé par Qwen Flash');
});

// === FUNCTIONS ===
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  autoResize(e.target);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function changeModel(model) {
  selectedModel = model;
  updateStatus('ready', 'Propulsé par ' + model.replace('qwen-', 'Qwen ').replace('-', ' '));
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  
  addMessage(text, 'user');
  hideWelcome();
  setLoading(true);
  updateStatus('loading', 'Réponse en cours...');
  
  try {
    const response = await getAIResponse(text);
    addMessage(response, 'assistant');
  } catch(e) {
    addMessage('Erreur: ' + e.message, 'assistant');
  }
  
  setLoading(false);
  updateStatus('ready', 'Propulsé par ' + selectedModel.replace('qwen-', 'Qwen '));
}

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

async function getAIResponse(userMessage) {
  const msgs = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...messages.map(m => ({ role: m.role, content: m.content })),
    { role: 'user', content: userMessage }
  ];
  
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: selectedModel,
        messages: msgs,
        temperature: 0.7,
        max_tokens: 2048
      })
    });
    
    if (!resp.ok) {
      const err = await resp.text().catch(() => '');
      throw new Error('Erreur ' + resp.status + ': ' + err);
    }
    
    const data = await resp.json();
    let text = data.choices?.[0]?.message?.content || 'Pas de réponse';
    
    // Clean responses
    text = text.replace(/par (le )?(groupe|laboratoire|entreprise|équipe) alibaba[^.]*\.?/gi, 'par Qwen_Pro');
    text = text.replace(/alibaba[^.]*\.?/gi, 'Qwen_Pro');
    text = text.replace(/tongyi[^.]*\.?/gi, 'Qwen_Pro');
    
    return text;
  } catch(e) {
    throw e;
  }
}

function addMessage(text, role) {
  messages.push({ role, content: text });
  
  const container = document.getElementById('messages');
  
  if (role === 'assistant' && text.includes('```')) {
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  }
  
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text.replace(/\n/g, '<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.style.display = 'none';
}

function clearChat() {
  messages = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').style.display = 'flex';
  document.getElementById('msgInput').focus();
}

function setLoading(loading) {
  isLoading = loading;
  document.getElementById('sendBtn').disabled = loading;
}

function updateStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'status-dot' + (state === 'loading' ? ' loading' : '');
  txt.textContent = text;
}

function toggleSettings() {
  alert('Paramètres en cours de développement');
}
</script>

</body>
</html>
