<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Qwen AI – Assistant Intelligent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --card: #1a1a25;
  --hover: #222235;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f5;
  --muted: #6b6b80;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --accent-dim: rgba(124,58,237,0.15);
  --success: #10b981;
  --error: #ef4444;
  --radius: 16px;
  --shadow: 0 4px 30px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  font-weight: 700;
}
.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), #ec4899);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.header-actions {
  display: flex;
  gap: 12px;
}
.icon-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.icon-btn:hover {
  background: var(--hover);
  color: var(--text);
  border-color: var(--accent);
}
.icon-btn.active {
  background: var(--accent-dim);
  color: var(--accent-light);
  border-color: var(--accent);
}
/* Main Layout */
.main-container {
  display: flex;
  flex: 1;
  overflow: hidden;
}
/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
}
.sidebar-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 0 8px;
}
.new-chat-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  border: none;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}
.new-chat-btn:hover {
  background: #6d28d9;
  transform: translateY(-1px);
}
.conv-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.conv-item {
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.conv-item:hover {
  background: var(--hover);
  color: var(--text);
}
.conv-item.active {
  background: var(--accent-dim);
  color: var(--accent-light);
}
/* Chat Area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
  padding: 0 20px;
}
/* Welcome */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}
.welcome h1 {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.welcome p {
  color: var(--muted);
  font-size: 16px;
  max-width: 500px;
}
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 30px;
}
.quick-btn {
  padding: 12px 20px;
  border-radius: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.quick-btn:hover {
  background: var(--hover);
  border-color: var(--accent);
  transform: translateY(-2px);
}
/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.messages::-webkit-scrollbar {
  display: none;
}
.msg {
  max-width: 700px;
  padding: 16px 20px;
  border-radius: 16px;
  line-height: 1.6;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.assistant pre {
  background: var(--surface);
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 12px 0;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
}
.msg.assistant code {
  background: var(--surface);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
}
/* Input Area */
.input-area {
  padding: 16px 0 24px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.msg-input {
  flex: 1;
  padding: 16px 20px;
  border-radius: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  resize: none;
  min-height: 56px;
  max-height: 200px;
  outline: none;
  transition: border-color 0.2s;
}
.msg-input:focus {
  border-color: var(--accent);
}
.msg-input::placeholder {
  color: var(--muted);
}
.send-btn {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--accent);
  border: none;
  color: white;
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.send-btn:hover {
  background: #6d28d9;
  transform: scale(1.05);
}
.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
/* Status Bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  font-size: 12px;
  color: var(--muted);
  gap: 8px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
}
.status-dot.loading {
  background: var(--accent);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
/* Model Select */
.model-select {
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.model-select:focus {
  border-color: var(--accent);
}
/* Loading dots */
.loading-dots {
  display: inline-flex;
  gap: 4px;
}
.loading-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.4s infinite ease-in-out;
}
.loading-dots span:nth-child(1) { animation-delay: 0s; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* Typing bubble animation */
.typing-bubble {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  max-width: 200px;
}
.typing-bubble .dot {
  width: 8px;
  height: 8px;
  background: var(--accent-light);
  border-radius: 50%;
  animation: typingDot 0.8s infinite;
}
.typing-bubble .dot:nth-child(1) { animation-delay: 0s; }
.typing-bubble .dot:nth-child(2) { animation-delay: 0.15s; }
.typing-bubble .dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typingDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Settings Panel */
.settings-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}
.settings-overlay.open {
  display: flex;
}
.settings-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 30px;
  max-width: 450px;
  width: 90%;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.settings-panel h2 {
  font-size: 22px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.settings-section {
  margin-bottom: 20px;
}
.settings-section label {
  display: block;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.settings-section input,
.settings-section select {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
}
.settings-section input:focus,
.settings-section select:focus {
  border-color: var(--accent);
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.settings-row:last-child {
  border-bottom: none;
}
.settings-row span {
  font-size: 14px;
}
.toggle-switch {
  width: 48px;
  height: 26px;
  background: var(--card);
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
}
.toggle-switch.active {
  background: var(--accent);
}
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: transform 0.3s;
}
.toggle-switch.active::after {
  transform: translateX(22px);
}
.close-settings {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: var(--accent);
  border: none;
  color: white;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}
.close-settings:hover {
  background: #6d28d9;
}

/* === RESPONSIVE MOBILE STYLES === */
@media (max-width: 768px) {
  /* Header */
  header {
    padding: 12px 16px;
  }
  .logo {
    font-size: 18px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    font-size: 16px;
  }
  .header-actions {
    gap: 8px;
  }
  .icon-btn, .model-select {
    width: 36px;
    height: 36px;
    font-size: 16px;
  }
  .model-select {
    font-size: 12px;
    padding: 0 8px;
  }
  
  /* Main Layout - hide sidebar by default on mobile */
  .main-container {
    flex-direction: column;
  }
  .sidebar {
    position: fixed;
    top: 0;
    left: -100%;
    width: 280px;
    height: 100vh;
    z-index: 200;
    transition: left 0.3s ease;
    padding-top: 60px;
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 199;
    display: none;
  }
  .sidebar-overlay.open {
    display: block;
  }
  
  /* Chat Area */
  .chat-area {
    flex: 1;
    padding: 16px;
  }
  
  /* Welcome */
  .welcome {
    padding: 20px;
  }
  .welcome h1 {
    font-size: 24px;
  }
  .welcome p {
    font-size: 14px;
  }
  .quick-actions {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .quick-btn {
    padding: 12px 16px;
    font-size: 13px;
  }
  
  /* Messages */
  .message {
    padding: 12px 16px;
    max-width: 95%;
  }
  .message.user {
    max-width: 90%;
  }
  .message-content {
    font-size: 15px;
    line-height: 1.5;
  }
  
  /* Input Area */
  .input-area {
    padding: 12px 16px;
    gap: 10px;
  }
  .msg-input {
    padding: 12px 16px;
    font-size: 16px;
    min-height: 48px;
  }
  .send-btn {
    width: 48px;
    height: 48px;
    font-size: 20px;
  }
  
  /* Status Bar */
  .status-bar {
    padding: 8px 16px;
    font-size: 12px;
  }
  
  /* Settings Panel */
  .settings-panel {
    width: 95%;
    max-width: 400px;
    padding: 20px;
  }
  
  /* Conv List - smaller on mobile */
  .conv-list {
    gap: 4px;
  }
  .conv-item {
    padding: 10px 12px;
    font-size: 13px;
  }
  
  /* Toggle sidebar button */
  .menu-btn {
    display: flex !important;
  }
}

/* Show menu button on mobile */
.menu-btn {
  display: none;
}

@media (max-width: 480px) {
  .welcome h1 {
    font-size: 20px;
  }
  .quick-actions {
    grid-template-columns: 1fr;
  }
  .message-content {
    font-size: 14px;
  }
}
</style>
</head>
<body>

<!-- Sidebar Overlay for Mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<header>

  <div class="logo">

    <span>Qwen AI</span>
  </div>

</header>

<div class="main-container">

    <button class="new-chat-btn" onclick="clearChat()">✨ Nouvelle discussion</button>
    <div class="sidebar-title">Conversations récentes</div>
    <div class="conv-list" id="convList"></div>
  </div>

  <div class="chat-area">
    <div class="welcome" id="welcome">
      <h1>Bienvenue sur Qwen AI</h1>
      <p>Votre assistant intelligent. Posez vos questions, demandez du code, des traductions, ou juste une conversation !</p>
      <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('Écris du code Python pour une fonction de tri')">💻 Code</button>
        <button class="quick-btn" onclick="sendQuick('Explique le machine learning en termes simples')">🧠 Expliquer</button>
        <button class="quick-btn" onclick="sendQuick('Traduis en anglais:')">🌍 Traduire</button>
        <button class="quick-btn" onclick="sendQuick('Écris un poème sur la nuit')">📝 Poème</button>
        <button class="quick-btn" onclick="sendQuick('Donne-moi des idées pour un projet')">💡 Idées</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">

      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusTxt">Propulsé par Qwen3 Max</span>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h2>⚙️ Paramètres</h2>
    
    <div class="settings-section">
      <label>Modèle IA</label>
      <select id="settingsModel">
        <option value="qwen3-max">Qwen3 Max</option>
        <option value="qwen3.7-max">Qwen3 7B Max</option>
      </select>
    </div>
    
    <div class="settings-section">
      <label>Température (créativité)</label>
      <input type="range" id="settingsTemp" min="0" max="100" value="70">
    </div>
    
    <div class="settings-section">
      <label>Longueur réponse</label>
      <select id="settingsLength">
        <option value="500">Courte</option>
        <option value="1000" selected>Moyenne</option>
        <option value="2000">Longue</option>
      </select>
    </div>
    
    <div class="settings-row">
      <span>Mode nuit</span>
      <div class="toggle-switch" id="toggleDark" onclick="toggleDark()"></div>
    </div>
    
    <div class="settings-row">
      <span>Animations</span>
      <div class="toggle-switch active" id="toggleAnim" onclick="toggleAnim()"></div>
    </div>
    
    <div class="settings-row">
      <span>Son notifications</span>
      <div class="toggle-switch" id="toggleSound" onclick="toggleSound()"></div>
    </div>
    
    <button class="close-settings" onclick="closeSettings()">Fermer</button>
  </div>
</div>

    if (mobileMaintenance) {
      mobileMaintenance.style.display = 'none';
    }
    return true;
  }
  */
}

// === STATE ===
let messages = [];
let selectedModel = 'qwen3-max';
let temperature = 0.7;
let maxTokens = 1000;
let animationsEnabled = true;
let conversations = [];
let userName = '';
let db = null; // IndexedDB instance

// === STORAGE SYSTEM (localStorage + IndexedDB fallback) ===
const DB_NAME = 'QwenAIDB';
const DB_VERSION = 1;
const STORE_CONVERSATIONS = 'conversations';
const STORE_SETTINGS = 'settings';

// Initialiser IndexedDB
function initIndexedDB() {
  return new Promise((resolve, reject) => {
    // Vérifier si IndexedDB est disponible
    if (!window.indexedDB) {
      console.warn('IndexedDB non disponible, utilisation de localStorage');
      resolve(null);
      return;
    }
    
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    
    // Gestion des erreurs IndexedDB
    request.onerror = (e) => {
      console.error('Erreur IndexedDB:', e);
      resolve(null); // Fallback vers localStorage
    };
    
    request.onsuccess = (e) => {
      db = e.target.result;
      console.log('IndexedDB initialisé avec succès');
      resolve(db);
    };
    
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      // Créer les stores si nécessaire
      if (!database.objectStoreNames.contains(STORE_CONVERSATIONS)) {
        database.createObjectStore(STORE_CONVERSATIONS, { keyPath: 'id' });
      }
      if (!database.objectStoreNames.contains(STORE_SETTINGS)) {
        database.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });
      }
    };
  });
}

// Sauvegarder dans IndexedDB
function saveToIndexedDB(storeName, data) {
  return new Promise((resolve, reject) => {
    if (!db) {
      reject(new Error('IndexedDB non initialisé'));
      return;
    }
    
    try {
      const transaction = db.transaction([storeName], 'readwrite');
      const store = transaction.objectStore(storeName);
      
      // Pour les conversations, on stocke un tableau
      const request = store.put({ id: 'all', data: data });
      
      request.onsuccess = () => resolve(true);
      request.onerror = () => reject(request.error);
    } catch (e) {
      reject(e);
    }
  });
}

// Charger depuis IndexedDB
function loadFromIndexedDB(storeName) {
  return new Promise((resolve, reject) => {
    if (!db) {
      reject(new Error('IndexedDB non initialisé'));
      return;
    }
    
    try {
      const transaction = db.transaction([storeName], 'readonly');
      const store = transaction.objectStore(storeName);
      const request = store.get('all');
      
      request.onsuccess = () => resolve(request.result?.data || null);
      request.onerror = () => reject(request.error);
    } catch (e) {
      reject(e);
    }
  });
}

// Sauvegarder avec fallback automatique (IndexedDB -> localStorage)
async function saveData(key, data) {
  try {
    // Essayer IndexedDB d'abord
    if (db) {
      await saveToIndexedDB(STORE_CONVERSATIONS, data);
      console.log('Sauvegarde IndexedDB réussie');
    }
  } catch (e) {
    console.warn('IndexedDB échoué, fallback localStorage:', e);
  }
  
  // Toujours sauvegarder dans localStorage comme backup
  try {
    localStorage.setItem(key, JSON.stringify(data));
    console.log('Sauvegarde localStorage réussie');
    return true;
  } catch (e) {
    // Si localStorage échoue (quota exceeded, etc.)
    console.error('localStorage échoué:', e);
    handleStorageError(e);
    return false;
  }
}

// Charger avec fallback automatique (IndexedDB -> localStorage)
async function loadData(key, defaultValue = null) {
  try {
    // Essayer IndexedDB d'abord
    if (db) {
      const data = await loadFromIndexedDB(STORE_CONVERSATIONS);
      if (data) {
        console.log('Chargement IndexedDB réussi');
        return data;
      }
    }
  } catch (e) {
    console.warn('IndexedDB échoué, fallback localStorage:', e);
  }
  
  // Fallback vers localStorage
  try {
    const saved = localStorage.getItem(key);
    if (saved) {
      console.log('Chargement localStorage réussi');
      return JSON.parse(saved);
    }
  } catch (e) {
    console.error('Erreur lecture localStorage:', e);
  }
  
  return defaultValue;
}

// Gérer les erreurs de stockage
function handleStorageError(error) {
  // QuotaExceededError - stockage plein
  if (error.name === 'QuotaExceededError') {
    console.warn('Stockage plein, nettoyage...');
    // Supprimer les anciennes conversations (garder les 5 dernières)
    if (conversations.length > 5) {
      conversations = conversations.slice(0, 5);
      saveData('qwen_conversations', conversations);
    }
    alert('Stockage plein. Les anciennes conversations ont été supprimées.');
  }
  // Autres erreurs
  else {
    console.error('Erreur stockage:', error);
  }
}

// Charger les conversations au démarrage
async function loadConversationsFromStorage() {
  conversations = await loadData('qwen_conversations', []);
  return conversations;
}

// Sauvegarder les conversations automatiquement
function autoSaveConversations() {
  saveData('qwen_conversations', conversations).then(() => {
    console.log('Conversations sauvegardées automatiquement');
  }).catch(e => {
    console.error('Erreur sauvegarde automatique:', e);
  });
}

// === USER FUNCTIONS ===
function saveUserName(name) {
  userName = name.trim();
  localStorage.setItem('qwen_username', userName);
}

function getGreeting() {
  const hour = new Date().getHours();
  if (hour < 6) return 'Bonne nuit';
  if (hour < 12) return 'Bonjour';
  if (hour < 18) return 'Bon après-midi';
  return 'Bonsoir';
}

function updateWelcomeMessage() {
  const welcomeEl = document.getElementById('welcome');
  const h1El = welcomeEl.querySelector('h1');
  
  if (userName) {
    h1El.textContent = `${getGreeting()}, ${userName}`;
  } else {
    h1El.textContent = `${getGreeting()} sur Qwen AI`;
  }
}

// === INIT ===
// Run maintenance check immediately (before DOMContentLoaded)
checkMaintenanceEnd();

document.addEventListener('DOMContentLoaded', async () => {
  // Initialiser IndexedDB d'abord
  await initIndexedDB();
  
  // Re-check maintenance status after DOM is ready
  checkMaintenanceEnd();
  
  // Charger le prénom depuis localStorage
  userName = localStorage.getItem('qwen_username') || '';
  
  // Update welcome message with greeting and user name
  updateWelcomeMessage();
  
  // Ask for name if not set
  if (!userName) {
    setTimeout(() => {
      const name = prompt('Comment puis-je vous appeler ? (Votre prénom)');
      if (name && name.trim()) {
        saveUserName(name.trim());
        updateWelcomeMessage();
      }
    }, 500);
  }
  updateStatus('ready', 'Propulsé par Qwen3 Max');
  
  // Charger les conversations depuis le stockage
  await loadConversationsFromStorage();
  loadConversations();
  
  // Auto-load last conversation if exists
  if (conversations.length > 0 && localStorage.getItem('qwen_last_conv_id')) {
    const lastId = parseInt(localStorage.getItem('qwen_last_conv_id'));
    const conv = conversations.find(c => c.id === lastId);
    if (conv) loadConversation(conv.id);
  }
});

// === CONVERSATION FUNCTIONS ===
function saveConversation() {
  if (messages.length === 0) return;
  const title = messages[0]?.content?.substring(0, 50) || 'Discussion';
  const conv = {
    id: Date.now(),
    title: title + (title.length >= 50 ? '...' : ''),
    messages: [...messages],
    model: selectedModel,
    date: new Date().toLocaleString('fr-FR')
  };
  // Remove duplicate if exists
  conversations = conversations.filter(c => c.id !== conv.id);
  conversations.unshift(conv);
  // Keep only last 20
  if (conversations.length > 20) conversations = conversations.slice(0, 20);
  
  // Sauvegarder avec le système robuste (IndexedDB + localStorage)
  saveData('qwen_conversations', conversations);
  localStorage.setItem('qwen_last_conv_id', conv.id.toString());
  
  loadConversations();
}

function loadConversations() {
  const list = document.getElementById('convList');
  if (!list) return;
  list.innerHTML = '';
  
  if (conversations.length === 0) {
    list.innerHTML = '<div style="color: var(--muted); font-size: 13px; text-align: center; padding: 20px;">Aucune conversation</div>';
    return;
  }
  
  conversations.forEach((conv, i) => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (i === 0 ? ' active' : '');
    div.innerHTML = `<span>💬</span><span style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${conv.title}</span><button onclick="event.stopPropagation(); deleteConversation(${conv.id})" style="background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px;">✕</button>`;
    div.onclick = () => loadConversation(conv.id);
    list.appendChild(div);
  });
}

function loadConversation(id) {
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  messages = [...conv.messages];
  selectedModel = conv.model || 'qwen3-max';
  document.getElementById('modelSelect').value = selectedModel;
  document.getElementById('welcome').style.display = 'none';
  const container = document.getElementById('messages');
  container.innerHTML = '';
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.innerHTML = m.content.replace(/\n/g, '<br>');
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

function deleteConversation(id) {
  conversations = conversations.filter(c => c.id !== id);
  // Sauvegarder avec le système robuste
  saveData('qwen_conversations', conversations);
  loadConversations();
}

// === FUNCTIONS ===
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  autoResize(e.target);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function changeModel(model) {
  selectedModel = model;
  document.getElementById('settingsModel').value = model;
  updateStatus('ready', 'Propulsé par ' + model.replace('qwen3-', 'Qwen3 '));
}

function toggleSettings() {
  document.getElementById('settingsOverlay').classList.add('open');
  document.getElementById('settingsModel').value = selectedModel;
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
  selectedModel = document.getElementById('settingsModel').value;
  temperature = document.getElementById('settingsTemp').value / 100;
  maxTokens = parseInt(document.getElementById('settingsLength').value);
  updateStatus('ready', 'Propulsé par ' + selectedModel.replace('qwen3-', 'Qwen3 '));
}

function toggleDark() {
  document.getElementById('toggleDark').classList.toggle('active');
}

function toggleAnim() {
  document.getElementById('toggleAnim').classList.toggle('active');
  animationsEnabled = !animationsEnabled;
  document.body.style.setProperty('--transition', animationsEnabled ? '0.2s' : '0s');
}

function toggleSound() {
  document.getElementById('toggleSound').classList.toggle('active');
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || window.isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  
  addMessage(text, 'user');
  hideWelcome();
  showTypingBubble();
  setLoading(true);
  updateStatus('loading', 'Qwen AI écrit...');

  try {
    const response = await getAIResponse(text);
    hideTypingBubble();
    addMessage(response, 'assistant');
  } catch(e) {
    hideTypingBubble();
    addMessage('Erreur: ' + e.message, 'assistant');
  }
  
  setLoading(false);
  updateStatus('ready', 'Propulsé par ' + selectedModel.replace('qwen3-', 'Qwen3 '));
}

function showTypingBubble() {
  const container = document.getElementById('messages');
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.id = 'typingBubble';
  bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  container.appendChild(bubble);
  container.scrollTop = container.scrollHeight;
}

function hideTypingBubble() {
  const bubble = document.getElementById('typingBubble');
  if (bubble) bubble.remove();
}

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

async function getAIResponse(userMessage) {
  const msgs = [
    { role: 'system', content: getSystemPrompt() },
    ...messages.map(m => ({ role: m.role, content: m.content })),
    { role: 'user', content: userMessage }
  ];
  
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: selectedModel,
        messages: msgs,
        temperature: temperature,
        max_tokens: maxTokens
      })
    });
    
    if (!resp.ok) {
      const err = await resp.text().catch(() => '');
      throw new Error('Erreur ' + resp.status + ': ' + err);
    }
    
    const data = await resp.json();
    let text = data.choices?.[0]?.message?.content || 'Pas de réponse';
    
    // Clean responses - remove asterisks for formatting
    text = text.replace(/\*\*([^*]+)\*\*/g, '$1'); // Remove bold
    text = text.replace(/\*([^*]+)\*/g, '$1'); // Remove italic
    text = text.replace(/__([^_]+)__/g, '$1'); // Remove underline
    text = text.replace(/_([^_]+)_/g, '$1'); // Remove italic underscore
    // Clean any remaining asterisks
    text = text.replace(/\*/g, '');
    
    // Also clean references to Alibaba
    text = text.replace(/par (le )?(groupe|laboratoire|entreprise|équipe) alibaba[^.]*\.?/gi, 'par Qwen_Pro');
    text = text.replace(/alibaba[^.]*\.?/gi, 'Qwen_Pro');
    text = text.replace(/tongyi[^.]*\.?/gi, 'Qwen_Pro');
    
    return text;
  } catch(e) {
    throw e;
  }
}

function addMessage(text, role) {
  messages.push({ role, content: text });
  
  const container = document.getElementById('messages');
  
  if (role === 'assistant' && text.includes('```')) {
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  }
  
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text.replace(/\n/g, '<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.style.display = 'none';
}

// Toggle sidebar for mobile
function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

function clearChat() {
  // Close sidebar if open on mobile
  const sidebar = document.querySelector('.sidebar');
  if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
    toggleSidebar();
  }
  // Save current conversation before clearing
  if (messages.length > 0) saveConversation();
  messages = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').style.display = 'flex';
  // Update welcome message with current greeting
  updateWelcomeMessage();
  document.getElementById('msgInput').focus();
}

function setLoading(loading) {
  window.isLoading = loading;
  document.getElementById('sendBtn').disabled = loading;
}

function updateStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'status-dot' + (state === 'loading' ? ' loading' : '');
  txt.textContent = text;
}
