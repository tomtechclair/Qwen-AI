<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen AI - Assistant Gratuit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .chat-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-y: auto;
            min-height: 400px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 10px;
            max-width: 80%;
        }
        
        .user-message {
            background: rgba(255, 255, 255, 0.2);
            margin-left: auto;
        }
        
        .ai-message {
            background: rgba(255, 255, 255, 0.15);
            margin-right: auto;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        #user-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
        }
        
        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Qwen AI</h1>
            <p class="subtitle">Assistant IA gratuit et illimité - Développé par tom_visionai_pro</p>
        </header>
        
        <div class="quick-actions">
            <button class="action-btn" onclick="quickAction('Écris du code pour')">💻 Code</button>
            <button class="action-btn" onclick="quickAction('Explique-moi')">🧠 Expliquer</button>
            <button class="action-btn" onclick="quickAction('Traduis en anglais:')">🌍 Traduire</button>
            <button class="action-btn" onclick="quickAction('Crée une image de')">🎨 Image</button>
        </div>
        
        <div class="chat-container" id="chat-container">
            <div class="message ai-message">
                Bonjour ! 👋 Je suis Qwen AI, ton assistant gratuit et illimité. Comment puis-je t'aider aujourd'hui ?
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Posez votre question..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Envoyer ➤</button>
        </div>
        
        <footer>
            <p>Développé par tom_visionai_pro • Propulsé par Qwen Flash via MuleRouter</p>
        </footer>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        
        // Fonction pour ajouter un message au chat
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Fonction pour gérer l'envoi de message
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // Ajouter le message utilisateur
            addMessage(message, true);
            userInput.value = '';
            
            // Afficher l'indicateur de chargement
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.innerHTML = '<span class="loading"></span> Réflexion...';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            try {
                // Simulation d'une réponse (à remplacer par ton API réelle)
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Supprimer l'indicateur de chargement
                chatContainer.removeChild(loadingDiv);
                
                // Réponse simulée
                const responses = [
                    "C'est une excellente question ! Voici ce que je pense...",
                    "Je comprends parfaitement. Laissez-moi vous expliquer...",
                    "Intéressant ! Voici ma réponse détaillée...",
                    "Merci pour cette question. Voici ce que je sais à ce sujet..."
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addMessage(randomResponse);
                
            } catch (error) {
                chatContainer.removeChild(loadingDiv);
                addMessage("Désolé, j'ai rencontré une erreur. Veuillez réessayer.");
            }
        }
        
        // Fonction pour gérer la touche Entrée
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Fonction pour les actions rapides
        function quickAction(text) {
            userInput.value = text;
            userInput.focus();
        }
        
        // Initialisation
        userInput.focus();
    </script>
</body>
</html>
