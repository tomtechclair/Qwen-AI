<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #7c3aed;
  --primary-light: #a78bfa;
  --bg: #0a0a0f;
  --surface: rgba(18, 18, 26, 0.85);
  --card: rgba(26, 26, 37, 0.9);
  --border: rgba(255, 255, 255, 0.1);
  --text: #f0f0f5;
  --text-muted: #9a9aa8;
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  --glass: blur(20px) saturate(180%);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; overflow: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  background-image: 
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124, 58, 237, 0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
  color: var(--text);
  display: flex;
  flex-direction: column;
}
#app { display: flex; flex-direction: column; height: 100vh; height: calc(var(--vh, 1vh) * 100); position: relative; }
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  box-shadow: var(--shadow); position: relative; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 19px; letter-spacing: -0.3px; }
.logo-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
}
.msg-list { 
  flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; 
  scroll-behavior: smooth;
}
.msg { 
  max-width: 88%; padding: 14px 18px; border-radius: 20px; line-height: 1.5; font-size: 15px;
  animation: slideIn 0.3s ease; word-wrap: break-word;
}
@keyframes slideIn { 
  from { opacity: 0; transform: translateY(8px); } 
  to { opacity: 1; transform: translateY(0); } 
}
.msg.user { 
  align-self: flex-end; 
  background: linear-gradient(135deg, var(--primary), #6d28d9); 
  color: white; 
  border-bottom-right-radius: 6px;
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
}
.msg.assistant { 
  align-self: flex-start; 
  background: var(--card); 
  border: 1px solid var(--border); 
  color: var(--text);
  border-bottom-left-radius: 6px;
  backdrop-filter: blur(10px);
}
.welcome { 
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
  padding: 20px; text-align: center; 
}
.welcome h1 { 
  font-size: 32px; font-weight: 700; margin-bottom: 16px; 
  background: linear-gradient(135deg, var(--text), var(--primary-light)); 
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.welcome p { color: var(--text-muted); font-size: 16px; max-width: 320px; line-height: 1.5; }
.quick-grid { 
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 28px; 
  width: 100%; max-width: 340px; 
}
.quick-btn { 
  padding: 14px 12px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); 
  color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.2s ease;
  backdrop-filter: blur(10px);
}
.quick-btn:active { 
  background: var(--surface); transform: scale(0.96);
}
.input-bar { 
  display: flex; gap: 10px; padding: 14px 16px; 
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px)); 
  background: var(--surface); border-top: 1px solid var(--border);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
}
.msg-input {
  flex: 1; padding: 14px 18px; border-radius: 24px; background: var(--card);
  border: 1px solid var(--border); color: var(--text); font-size: 15px; outline: none; 
  min-height: 46px; max-height: 120px; resize: none;
  transition: border-color 0.2s;
}
.msg-input:focus { border-color: var(--primary); }
.send-btn { 
  width: 46px; height: 46px; border-radius: 23px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); 
  border: none; color: white; font-size: 18px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
  transition: transform 0.2s;
}
.send-btn:active { transform: scale(0.92); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.typing { 
  display: flex; align-items: center; gap: 6px; padding: 14px 18px; background: var(--card); 
  border: 1px solid var(--border); border-radius: 18px; align-self: flex-start; 
  border-bottom-left-radius: 4px; backdrop-filter: blur(10px);
}
.typing .dot { 
  width: 8px; height: 8px; background: var(--primary-light); border-radius: 50%; 
  animation: bounce 1s infinite; 
}
.typing .dot:nth-child(2) { animation-delay: 0.2s; }
.typing .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
.loader { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; align-self: flex-start; border-bottom-left-radius: 4px; }
.loader .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.search-loader { 
  display: flex; align-items: center; gap: 10px; padding: 14px 18px; 
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(124, 58, 237, 0.05)); 
  border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 18px; align-self: flex-start; 
  border-bottom-left-radius: 4px; box-shadow: 0 4px 24px rgba(124, 58, 237, 0.25);
}
.search-loader .icon { font-size: 20px; animation: pulse 1.2s ease-in-out infinite; }
.search-loader .text { font-size: 13px; color: var(--primary-light); font-weight: 600; letter-spacing: 0.3px; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.15); } }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: var(--surface);
  transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); 
  z-index: 100; border-right: 1px solid var(--border); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
}
.sidebar.open { transform: translateX(0); }
.overlay { 
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); 
  opacity: 0; visibility: hidden; transition: opacity 0.3s ease; z-index: 99; 
  -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
}
.overlay.active { opacity: 1; visibility: visible; }
.settings { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
.settings.open { display: flex; }
.settings-panel { 
  background: var(--surface); border-radius: 24px; padding: 28px; 
  width: 92%; max-width: 360px; border: 1px solid var(--border);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); box-shadow: var(--shadow);
}
.settings-panel h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
.settings-panel label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.settings-panel select { 
  width: 100%; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); 
  border-radius: 12px; color: var(--text); font-size: 15px; outline: none;
}
.settings-panel button {
  width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border: none; border-radius: 12px; color: white; font-weight: 600; font-size: 15px; cursor: pointer;
  margin-top: 16px;
}
</style>
</head>

<script>
const API_URL='https://api.mulerouter.ai/vendors/openai/v1/chat/completions';
const API_KEY='sk-mr-a32a7cf0ae2b1ef610f64c038429b9b6ea4a5575312c8e8899576ce39e446f1d';
let messages=[], selectedModel='qwen3-max', isLoading=false, userName='', conversations=[];

function getGreeting() {
  const h = new Date().getHours();
  if(h < 6) return 'Bonne nuit';
  if(h < 12) return 'Bonjour';
  if(h < 18) return 'Bon après-midi';
  return 'Bonsoir';
}

function updateWelcome() {
  const h1 = document.getElementById('welcomeTitle');
  h1.textContent = userName ? `${getGreeting()} ${userName} 👋` : `${getGreeting()} 👋`;
}

function saveName(name) {
  if(name && name.trim()) {
    userName = name.trim();
    localStorage.setItem('qwen_name', userName);
    updateWelcome();
  }
}

function getSystemPrompt() {
  return 'Tu es Qwen AI, un assistant intelligent créé par Qwen_Pro. Tu réponds en français de manière naturelle et concise.';
}

async function performWebSearch(q) {
  const enc = encodeURIComponent(q);
  const url = `https://api.duckduckgo.com/?q=${enc}&format=json&no_html=1`;
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://api.codetabs.com/v1/proxy?quest='
  ];
  for(const p of proxies) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 4000);
      const r = await fetch(p + encodeURIComponent(url), { signal: controller.signal });
      clearTimeout(timeout);
      if(r.ok) {
        const d = await r.json();
        return { text: d.AbstractText || '', html: '', hasResults: !!d.AbstractText };
      }
    } catch(e) { continue; }
  }
  return { text: '', html: '', hasResults: false };
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

async function fetchAndAnalyze(url) {
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://api.codetabs.com/v1/proxy?quest='
  ];
  for(const p of proxies) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const response = await fetch(p + encodeURIComponent(url), {
        signal: controller.signal,
        headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
      });
      clearTimeout(timeout);
      if(response.ok) {
        const html = await response.text();
        return parseAndAnalyzeHTML(html, url);
      }
    } catch(e) { continue; }
  }
  return null;
}

function parseAndAnalyzeHTML(html, url) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('script, style').forEach(el => el.remove());
    
    const titleEl = doc.querySelector('title');
    const title = titleEl ? titleEl.textContent.trim() : 'Sans titre';
    
    let description = '';
    for(const sel of ['meta[name="description"]', 'meta[property="og:description"]', 'meta[name="twitter:description"]']) {
      const meta = doc.querySelector(sel);
      if(meta && meta.content) { description = meta.content.trim(); break; }
    }
    
    let imageUrl = '';
    for(const sel of ['meta[property="og:image"]', 'meta[name="twitter:image"]', 'link[rel="image_src"]']) {
      const el = doc.querySelector(sel);
      if(el && (el.content || el.href)) {
        imageUrl = el.content || el.href;
        try {
          const u = new URL(imageUrl, url);
          imageUrl = u.toString();
        } catch(e) {
          if(imageUrl.startsWith('//')) imageUrl = 'https:' + imageUrl;
          else if(imageUrl.startsWith('/')) {
            const base = new URL(url);
            imageUrl = base.origin + imageUrl;
          }
        }
        break;
      }
    }
    
    const main = doc.querySelector('main, article, .content, #content, .post, .entry') || doc.body;
    let textContent = main ? main.textContent : doc.body.textContent;
    textContent = textContent.replace(/\s+/g, ' ').trim();
    
    return {
      title, description, imageUrl, url,
      textContent: textContent.substring(0, 1000),
      domain: new URL(url).hostname
    };
  } catch(e) {
    return { title: 'Erreur d\'analyse', description: 'Impossible d\'analyser cette page.', url };
  }
}

function displayAnalysis(data) {
  if(!data) return '<div style="padding:10px;color:var(--error)">❌ Impossible d\'analyser ce lien</div>';
  let html = '<div style="padding:12px;"><div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;">';
  if(data.imageUrl) {
    html += `<img src="${data.imageUrl}" alt="${escapeHtml(data.title)}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;">`;
  } else {
    html += '<div style="width:80px;height:80px;background:var(--card);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;">📄</div>';
  }
  html += '<div style="flex:1;"><div style="font-weight:600;margin-bottom:4px;">' + escapeHtml(data.title) + '</div>';
  html += '<div style="color:var(--text-muted);font-size:14px;margin-bottom:8px;">' + escapeHtml(data.description || 'Aucune description') + '</div>';
  html += '<div style="font-size:13px;color:var(--text-muted);">Domaine: ' + escapeHtml(data.domain) + '</div></div></div>';
  if(data.textContent && data.textContent.length > 50) {
    html += '<div style="background:var(--card);border-radius:8px;padding:12px;margin-top:8px;border:1px solid var(--border);">';
    html += '<div style="font-weight:600;margin-bottom:8px;">Résumé du contenu:</div>';
    html += '<p style="color:var(--text);line-height:1.5;margin:0;">' + escapeHtml(data.textContent.substring(0, 300)) + '...</div>';
  }
  html += '</div>';
  return html;
}

async function getAIResponse(msg) {
  const msgs = [{role:'system', content:getSystemPrompt()}, ...messages.map(m=>({role:m.role, content:m.content})), {role:'user', content:msg}];
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
    body:JSON.stringify({model:selectedModel, messages:msgs, temperature:0.7, max_tokens:1000})
  });
  if(!r.ok) throw new Error(r.status);
  const d = await r.json();
  return d.choices[0].message.content.replace(/\*\*/g,'').replace(/\*/g,'');
}

function addMessage(text, role) {
  messages.push({role, content:text});
  const c = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text.replace(/\n/g,'<br>');
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function hideWelcome() {
  document.getElementById('welcome').style.display = 'none';
}

function showTyping() {
  const c = document.getElementById('messages');
  const b = document.createElement('div');
  b.className = 'typing';
  b.id = 'typing';
  b.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  c.appendChild(b);
  c.scrollTop = c.scrollHeight;
}

function hideTyping() {
  const b = document.getElementById('typing');
  if(b) b.remove();
}

function showLoader(text) {
  const c = document.getElementById('messages');
  const b = document.createElement('div');
  b.className = 'search-loader';
  b.id = 'searchLoader';
  b.innerHTML = '<span class="icon">🔍</span><span class="text">' + text + '</span>';
  c.appendChild(b);
  c.scrollTop = c.scrollHeight;
}

function hideLoader() {
  const b = document.getElementById('searchLoader');
  if(b) b.remove();
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('sendBtn').disabled = v;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  hideWelcome();
  addMessage(text, 'user');
  setLoading(true);
  showTyping();
  
  const urlMatch = text.match(/https?:\/\/[^\s]+/i);
  const isUrlReq = /analyse|que.*vaut/i.test(text) && urlMatch;
  
  if(isUrlReq && urlMatch) {
    hideTyping();
    const c = document.getElementById('messages');
    const m = document.createElement('div');
    m.className = 'search-loader';
    m.id = 'searchLoader';
    m.innerHTML = '<span class="icon">🔗</span><span class="text">Analyse du lien en cours...</span>';
    c.appendChild(m);
    c.scrollTop = c.scrollHeight;
    
    try {
      const d = await fetchAndAnalyze(urlMatch[0]);
      hideLoader();
      if(d) {
        m.className = 'msg assistant';
        m.id = '';
        m.innerHTML = displayAnalysis(d);
      } else {
        m.className = 'msg assistant';
        m.id = '';
        m.innerHTML = '❌ Échec analyse - URL inaccessible';
      }
    } catch(err) {
      hideLoader();
      addMessage('❌ Erreur: ' + err.message, 'assistant');
    }
    c.scrollTop = c.scrollHeight;
    setLoading(false);
    return;
  }
  
  try {
    hideTyping();
    showLoader('Recherche sur le web...');
    const searchResult = await performWebSearch(text);
    hideLoader();
    
    let response = '';
    if(searchResult.hasResults) {
      const contextWithSearch = [...messages.map(m=>({role:m.role, content:m.content})), {role:'user', content:`Réponds à cette question en utilisant ces résultats de recherche:\n\n${searchResult.text}\n\nQuestion: ${text}`}];
      const r = await fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
        body:JSON.stringify({model:selectedModel, messages:[{role:'system', content:getSystemPrompt()}, ...contextWithSearch], temperature, max_tokens:maxTokens})
      });
      if(!r.ok) throw new Error(r.status);
      const d = await r.json();
      response = d.choices[0].message.content.replace(/\*\*/g,'').replace(/\*/g,'');
      addMessage(cleanResponse(response), 'assistant');
    } else {
      response = await getAIResponse(text);
      addMessage(cleanResponse(response), 'assistant');
    }
    hideTyping();
  } catch(e) {
    hideTyping();
    hideLoader();
    addMessage('Erreur: ' + e.message, 'assistant');
  }
  setLoading(false);
}

function cleanResponse(text) {
  return text
    .replace(/Alibaba\s*(Cloud|Group|\.com)?/gi, 'Qwen_Pro')
    .replace(/Tongyi\s*(Lab|Team)?/gi, 'Qwen_Pro');
}

function sendQuick(t) {
  document.getElementById('msgInput').value = t;
  sendMessage();
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  autoResize(e.target);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
}

function closeSettings() {
  document.getElementById('settings').classList.remove('open');
}

function clearChat() {
  closeSidebar();
  if(messages.length > 0) saveConversation();
  messages = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').style.display = 'flex';
  document.getElementById('msgInput').focus();
}

function saveConversation() {
  if(messages.length === 0) return;
  const title = messages[0].content.substring(0, 50) || 'Discussion';
  const conv = {
    id: Date.now(),
    title: title + (title.length >= 50 ? '...' : ''),
    messages: [...messages],
    model: selectedModel,
    date: new Date().toLocaleString('fr-FR')
  };
  conversations = [conv, ...conversations.filter(c => c.id !== conv.id)].slice(0, 20);
  localStorage.setItem('qwen_conversations', JSON.stringify(conversations));
  localStorage.setItem('qwen_last_conv_id', conv.id.toString());
  loadConversations();
}

function loadConversations() {
  const list = document.getElementById('convList');
  if(!list) return;
  const convs = JSON.parse(localStorage.getItem('qwen_conversations') || '[]');
  conversations = convs;
  list.innerHTML = convs.length ? '' : '<div style="color:var(--text-muted);padding:20px;text-align:center">Aucune conversation</div>';
  convs.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (i === 0 ? ' active' : '');
    div.style.cssText = 'padding:12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:4px;';
    div.innerHTML = '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">💬 ' + escapeHtml(c.title) + '</span><button onclick="event.stopPropagation();deleteConversation(' + c.id + ')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px">✕</button>';
    div.onclick = () => loadConversation(c.id);
    list.appendChild(div);
  });
}

function loadConversation(id) {
  closeSidebar();
  const conv = conversations.find(c => c.id === id);
  if(!conv) return;
  messages = conv.messages;
  selectedModel = conv.model || 'qwen3-max';
  document.getElementById('modelSelect').value = selectedModel;
  document.getElementById('welcome').style.display = 'none';
  const c = document.getElementById('messages');
  c.innerHTML = '';
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.innerHTML = m.content.replace(/\n/g,'<br>');
    c.appendChild(div);
  });
  c.scrollTop = c.scrollHeight;
}

function deleteConversation(id) {
  conversations = conversations.filter(c => c.id !== id);
  localStorage.setItem('qwen_conversations', JSON.stringify(conversations));
  loadConversations();
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function askName() {
  const name = prompt('Comment vous appelez-vous ?');
  if(name) saveName(name);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modelSelect').value = selectedModel;
  userName = localStorage.getItem('qwen_name') || '';
  updateWelcome();
  loadConversations();
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
  setTimeout(askName, 500);
});

window.addEventListener('resize', () => {
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
});
</script>
</body>
