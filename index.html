<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #7c3aed;
  --primary-light: #a78bfa;
  --primary-dark: #5b21b6;
  --bg: #06060a;
  --surface: rgba(15, 15, 25, 0.88);
  --card: rgba(22, 22, 35, 0.92);
  --card-hover: rgba(30, 30, 50, 0.95);
  --border: rgba(255, 255, 255, 0.08);
  --border-light: rgba(255, 255, 255, 0.14);
  --text: #f0f0f5;
  --text-muted: #8a8a9a;
  --text-dim: #5a5a6e;
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.6);
  --glass: blur(24px) saturate(200%);
  --gradient-primary: linear-gradient(135deg, #7c3aed, #a78bfa);
  --gradient-bg: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124, 58, 237, 0.18) 0%, transparent 60%),
                 radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124, 58, 237, 0.10) 0%, transparent 50%),
                 radial-gradient(ellipse 40% 30% at 20% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
*::-webkit-scrollbar { width: 4px; height: 4px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
html, body { height: 100%; width: 100%; overflow: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: var(--bg);
  background-image: var(--gradient-bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}
#app { display: flex; flex-direction: column; height: 100vh; height: calc(var(--vh, 1vh) * 100); position: relative; z-index: 1; }
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  box-shadow: var(--shadow); position: relative; z-index: 100;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative; z-index: 100;
}
header::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.4), transparent);
}
.logo { 
  display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 20px; 
  letter-spacing: -0.4px;
}
.logo-icon {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--gradient-primary);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
  font-weight: 800; font-size: 18px;
  position: relative;
  overflow: hidden;
}
.logo-icon::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
  animation: logoShine 4s ease-in-out infinite;
}
@keyframes logoShine {
  0%, 100% { transform: translateX(-100%) rotate(45deg); }
  50% { transform: translateX(100%) rotate(45deg); }
}
.header-btn {
  width: 42px; height: 42px; border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text); 
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.25s ease;
  font-size: 18px;
  position: relative;
  overflow: hidden;
}
.header-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--border-light);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.header-btn:active { transform: scale(0.94); }
.msg-list { 
  flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 20px; 
  scroll-behavior: smooth;
  mask-image: linear-gradient(to bottom, transparent 0%, black 2%, black 98%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 2%, black 98%, transparent 100%);
}
.msg { 
  max-width: 85%; padding: 16px 20px; border-radius: 24px; line-height: 1.6; font-size: 15px;
  animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); word-wrap: break-word;
  position: relative;
  letter-spacing: -0.2px;
}
@keyframes msgIn { 
  from { opacity: 0; transform: translateY(16px) scale(0.95); } 
  to { opacity: 1; transform: translateY(0) scale(1); } 
}
.msg.user { 
  align-self: flex-end; 
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white; 
  border-bottom-right-radius: 8px;
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  font-weight: 450;
}
.msg.user::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
  pointer-events: none;
}
.msg.assistant { 
  align-self: flex-start; 
  background: var(--card); 
  border: 1px solid var(--border); 
  color: var(--text);
  border-bottom-left-radius: 8px;
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
}
.msg.assistant::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  border-radius: inherit;
}
.welcome { 
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
  padding: 40px 24px; text-align: center; 
  animation: welcomeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes welcomeIn {
  from { opacity: 0; transform: translateY(30px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.welcome-avatar {
  width: 88px; height: 88px; border-radius: 26px;
  background: var(--gradient-primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; font-weight: 800;
  box-shadow: 0 12px 40px rgba(124, 58, 237, 0.5);
  margin-bottom: 32px;
  position: relative;
  animation: avatarFloat 3s ease-in-out infinite;
}
.welcome-avatar::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 29px;
  background: var(--gradient-primary);
  opacity: 0.3;
  z-index: -1;
  animation: avatarPulse 2s ease-in-out infinite;
}
@keyframes avatarFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@keyframes avatarPulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.08); opacity: 0.15; }
}
.welcome h1 { 
  font-size: 34px; font-weight: 800; margin-bottom: 12px; 
  background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #a78bfa 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
  line-height: 1.2;
}
.welcome p { color: var(--text-muted); font-size: 16px; max-width: 300px; line-height: 1.6; font-weight: 400; }
.quick-grid { 
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 36px; 
  width: 100%; max-width: 340px; 
}
.quick-btn { 
  padding: 16px 14px; border-radius: 18px; background: var(--card); border: 1px solid var(--border); 
  color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.25s ease;
  backdrop-filter: blur(10px); font-weight: 500;
  position: relative; overflow: hidden;
  font-family: inherit;
}
.quick-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(124,58,237,0.1) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.25s ease;
}
.quick-btn:hover::before { opacity: 1; }
.quick-btn:hover {
  border-color: var(--border-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.2);
}
.quick-btn:active { 
  transform: scale(0.96);
  transition: transform 0.1s ease;
}
.input-bar { 
  display: flex; gap: 12px; padding: 16px 16px; 
  padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px)); 
  background: var(--surface); border-top: 1px solid var(--border);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  position: relative;
}
.input-bar::before {
  content: '';
  position: absolute;
  top: -1px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 10%, rgba(124, 58, 237, 0.3) 50%, transparent 90%);
}
.msg-input {
  flex: 1; padding: 16px 20px; border-radius: 24px; background: var(--card);
  border: 1px solid var(--border); color: var(--text); font-size: 15px; outline: none; 
  min-height: 48px; max-height: 120px; resize: none;
  transition: all 0.2s ease;
  font-family: inherit;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
.msg-input:focus { 
  border-color: var(--primary); 
  background: var(--card-hover);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 0 3px rgba(124,58,237,0.15);
}
.msg-input::placeholder { color: var(--text-dim); }
.send-btn { 
  width: 48px; height: 48px; border-radius: 16px; 
  background: var(--gradient-primary); 
  border: none; color: white; font-size: 18px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
  transition: all 0.25s ease;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
.send-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.25s ease;
}
.send-btn:hover::before { opacity: 1; }
.send-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(124, 58, 237, 0.6);
}
.send-btn:active { transform: scale(0.92); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.typing { 
  display: flex; align-items: center; gap: 8px; padding: 16px 20px; 
  background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
  align-self: flex-start; border-bottom-left-radius: 8px; 
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
  animation: msgIn 0.3s ease;
}
.typing .dot { 
  width: 9px; height: 9px; background: var(--primary-light); border-radius: 50%; 
  animation: bounce 1.2s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(167, 139, 250, 0.5);
}
.typing .dot:nth-child(2) { animation-delay: 0.2s; }
.typing .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 
  0%, 60%, 100% { transform: translateY(0); } 
  30% { transform: translateY(-8px); } 
}
.loader { 
  display: flex; align-items: center; gap: 12px; padding: 16px 20px; 
  background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
  align-self: flex-start; border-bottom-left-radius: 8px;
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
}
.loader .spinner { 
  width: 22px; height: 22px; border: 2.5px solid var(--border); 
  border-top-color: var(--primary-light); border-radius: 50%; 
  animation: spin 0.8s linear infinite;
  box-shadow: 0 0 12px rgba(167, 139, 250, 0.3);
}
@keyframes spin { to { transform: rotate(360deg); } }
.search-loader { 
  display: flex; align-items: center; gap: 10px; padding: 14px 18px; 
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(124, 58, 237, 0.05)); 
  border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 18px; align-self: flex-start; 
  border-bottom-left-radius: 4px; box-shadow: 0 4px 24px rgba(124, 58, 237, 0.25);
}
.search-loader .icon { font-size: 20px; animation: pulse 1.2s ease-in-out infinite; }
.search-loader .text { font-size: 13px; color: var(--primary-light); font-weight: 600; letter-spacing: 0.3px; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.15); } }
 .sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: 300px; background: var(--surface);
  transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); 
  z-index: 100; border-right: 1px solid var(--border);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
}
.sidebar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, rgba(124, 58, 237, 0.05) 0%, transparent 30%);
  pointer-events: none;
}
.sidebar.open { transform: translateX(0); }
.overlay { 
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); 
  opacity: 0; visibility: hidden; transition: opacity 0.35s ease; z-index: 99; 
  -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
}
.overlay.active { opacity: 1; visibility: visible; }
.settings { 
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); 
  display: none; align-items: center; justify-content: center; z-index: 100;
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  animation: fadeIn 0.3s ease;
}
.settings.open { display: flex; }
.settings-panel { 
  background: var(--surface); border-radius: 24px; padding: 30px; 
  width: 92%; max-width: 380px; border: 1px solid var(--border-light);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
  animation: settingsIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes settingsIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.settings-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
  pointer-events: none;
}
.settings-panel h2 { 
  font-size: 22px; font-weight: 800; margin-bottom: 26px; 
  letter-spacing: -0.4px;
  background: linear-gradient(135deg, #ffffff, #c4b5fd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.settings-panel label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.settings-panel select { 
  width: 100%; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); 
  border-radius: 14px; color: var(--text); font-size: 15px; outline: none;
  transition: all 0.2s ease;
  font-family: inherit;
  cursor: pointer;
}
.settings-panel select:hover { border-color: var(--border-light); }
.settings-panel select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
.settings-panel button {
  width: 100%; padding: 15px; background: var(--gradient-primary);
  border: none; border-radius: 14px; color: white; font-weight: 600; font-size: 15px; cursor: pointer;
  margin-top: 20px;
  transition: all 0.25s ease;
  letter-spacing: 0.2px;
  font-family: inherit;
  box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
}
.settings-panel button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(124, 58, 237, 0.5);
}
.settings-panel button:active { transform: scale(0.96); }

.fade-in { animation: fadeIn 0.6s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }

.conv-item {
  padding: 14px 16px; border-radius: 14px; cursor: pointer;
  display: flex; align-items: center; gap: 12px; margin: 6px 12px;
  transition: all 0.2s ease;
  border: 1px solid transparent;
  position: relative;
}
.conv-item:hover {
  background: rgba(255,255,255,0.04);
  border-color: var(--border);
}
.conv-item.active {
  background: rgba(124, 58, 237, 0.12);
  border-color: rgba(124, 58, 237, 0.25);
}
.conv-item .conv-title {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-size: 14px; font-weight: 450;
}
.conv-item .conv-delete {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 16px; padding: 6px; border-radius: 8px; transition: all 0.2s ease;
  opacity: 0;
}
.conv-item:hover .conv-delete { opacity: 1; }
.conv-item .conv-delete:hover { 
  color: #ff453a; 
  background: rgba(255, 69, 58, 0.1);
}

.code-block {
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-top: 12px;
  overflow: hidden;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
  backdrop-filter: blur(8px);
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: rgba(255, 255, 255, 0.04);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.code-actions {
  display: flex;
  gap: 8px;
}
.code-action-btn {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 4px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  transition: all 0.2s ease;
  font-family: inherit;
}
.code-action-btn:hover {
  background: rgba(255, 255, 255, 0.12);
  color: var(--text);
  border-color: var(--border-light);
}
.code-action-btn:active {
  transform: scale(0.95);
}
.code-content {
  padding: 14px 16px;
  overflow-x: auto;
  position: relative;
  color: #e0e0e0;
  white-space: pre;
  tab-size: 2;
}
.code-content .keyword {
  color: #c678dd;
  font-weight: 500;
}
.code-content .string {
  color: #98c379;
}
.code-content .number {
  color: #d19a66;
}
.code-content .comment {
  color: #5c6370;
  font-style: italic;
}
.code-content .function {
  color: #61afef;
}
.code-content .operator {
  color: #56b6c2;
}
.code-content .punctuation {
  color: #abb2bf;
}
.typing-cursor {
  display: inline-block;
  width: 7px;
  height: 16px;
  background: var(--primary-light);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(167, 139, 250, 0.6);
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
</style>
</head>
<body>
<div id="app">
   <header>
     <button class="header-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
     <div class="logo"><div class="logo-icon">Q</div><span>Qwen</span></div>
     <button class="header-btn" id="settingsBtn" onclick="toggleSettings()">⚙</button>
   </header>
   
  <div class="sidebar" id="sidebar">
    <div style="padding:24px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:17px;display:flex;align-items:center;gap:12px;background:linear-gradient(180deg, rgba(124,58,237,0.08) 0%, transparent 100%);">
      <div style="width:38px;height:38px;border-radius:12px;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;box-shadow:0 6px 16px rgba(124,58,237,0.4);">Q</div>
      Qwen AI
    </div>
    <button id="newChatBtn" onclick="clearChat()" style="margin:16px;background:var(--gradient-primary);color:white;border:none;padding:14px;border-radius:16px;font-weight:600;cursor:pointer;font-size:14px;letter-spacing:0.2px;box-shadow:0 4px 16px rgba(124,58,237,0.35);transition:all 0.2s ease;font-family:inherit;">+ Nouvelle discussion</button>
    <div id="convList" style="flex:1;overflow-y:auto;padding:8px;"></div>
  </div>
  
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

async function performWebSearch(q) {
  const enc = encodeURIComponent(q);
  const url = `https://api.duckduckgo.com/?q=${enc}&format=json&no_html=1`;
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://api.codetabs.com/v1/proxy?quest='
  ];
  for(const p of proxies) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 4000);
      const r = await fetch(p + encodeURIComponent(url), { signal: controller.signal });
      clearTimeout(timeout);
      if(r.ok) {
        const d = await r.json();
        return { text: d.AbstractText || '', html: '', hasResults: !!d.AbstractText };
      }
    } catch(e) { continue; }
  }
  return { text: '', html: '', hasResults: false };
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function highlightCode(code) {
  let html = escapeHtml(code);
  html = html.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '<span class="comment">$&</span>');
  html = html.replace(/(["'`])(?:(?=(\\?))\2.)*?\1/g, '<span class="string">$&</span>');
  html = html.replace(/\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|class|extends|new|this|import|export|default|from|async|await|try|catch|throw|finally|typeof|instanceof|in|of|true|false|null|undefined|void|delete|yield|static|get|set)\b/g, '<span class="keyword">$1</span>');
  html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="number">$1</span>');
  html = html.replace(/\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*(?=\()/g, '<span class="function">$1</span>');
  html = html.replace(/([+\-*/%=<>!&|^~?:]+)/g, '<span class="operator">$1</span>');
  return html;
}

function detectAndFormatCode(text) {
  const codeBlockRegex = /```(\w*)\n?([\s\S]*?)```/g;
  let result = '';
  let lastIndex = 0;
  let match;
  let hasCodeBlock = false;
  
  while ((match = codeBlockRegex.exec(text)) !== null) {
    hasCodeBlock = true;
    if (match.index > lastIndex) {
      result += escapeHtml(text.substring(lastIndex, match.index)).replace(/\n/g, '<br>');
    }
    
    const lang = match[1] || 'code';
    const code = match[2].trim();
    const highlighted = highlightCode(code);
    
    result += `
      <div class="code-block">
        <div class="code-header">
          <span>${escapeHtml(lang)}</span>
          <div class="code-actions">
            <button class="code-action-btn" onclick="copyCode(this)" data-code="${escapeHtml(code)}">📋 Copier</button>
          </div>
        </div>
        <div class="code-content"><code>${highlighted}</code></div>
      </div>
    `;
    lastIndex = match.index + match[0].length;
  }
  
  if (!hasCodeBlock) {
    return escapeHtml(text).replace(/\n/g, '<br>');
  }
  
  if (lastIndex < text.length) {
    result += escapeHtml(text.substring(lastIndex)).replace(/\n/g, '<br>');
  }
  
  return result;
}

function copyCode(btn) {
  const code = btn.getAttribute('data-code');
  navigator.clipboard.writeText(code).then(() => {
    const originalText = btn.textContent;
    btn.textContent = '✅ Copié !';
    btn.style.color = '#30D158';
    setTimeout(() => {
      btn.textContent = originalText;
      btn.style.color = '';
    }, 2000);
  });
}

async function streamMessage(text, role) {
  const c = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  
  const formatted = detectAndFormatCode(text);
  const hasCodeBlock = text.includes('```');
  
  if (hasCodeBlock) {
    div.innerHTML = formatted;
    c.appendChild(div);
    c.scrollTop = c.scrollHeight;
  } else {
    div.innerHTML = '';
    div.id = 'streaming-msg';
    c.appendChild(div);
    
    const words = text.split(' ');
    let current = '';
    
    for (let i = 0; i < words.length; i++) {
      current += (i > 0 ? ' ' : '') + words[i];
      div.innerHTML = escapeHtml(current) + '<span class="typing-cursor"></span>';
      c.scrollTop = c.scrollHeight;
      await new Promise(resolve => setTimeout(resolve, 25 + Math.random() * 20));
    }
    
    div.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
    delete div.id;
  }
  
  c.scrollTop = c.scrollHeight;
}

async function fetchAndAnalyze(url) {
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://api.codetabs.com/v1/proxy?quest='
  ];
  for(const p of proxies) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const response = await fetch(p + encodeURIComponent(url), {
        signal: controller.signal,
        headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
      });
      clearTimeout(timeout);
      if(response.ok) {
        const html = await response.text();
        return parseAndAnalyzeHTML(html, url);
      }
    } catch(e) { continue; }
  }
  return null;
}

function parseAndAnalyzeHTML(html, url) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('script, style').forEach(el => el.remove());
    
    const titleEl = doc.querySelector('title');
    const title = titleEl ? titleEl.textContent.trim() : 'Sans titre';
    
    let description = '';
    for(const sel of ['meta[name="description"]', 'meta[property="og:description"]', 'meta[name="twitter:description"]']) {
      const meta = doc.querySelector(sel);
      if(meta && meta.content) { description = meta.content.trim(); break; }
    }
    
    let imageUrl = '';
    for(const sel of ['meta[property="og:image"]', 'meta[name="twitter:image"]', 'link[rel="image_src"]']) {
      const el = doc.querySelector(sel);
      if(el && (el.content || el.href)) {
        imageUrl = el.content || el.href;
        try {
          const u = new URL(imageUrl, url);
          imageUrl = u.toString();
        } catch(e) {
          if(imageUrl.startsWith('//')) imageUrl = 'https:' + imageUrl;
          else if(imageUrl.startsWith('/')) {
            const base = new URL(url);
            imageUrl = base.origin + imageUrl;
          }
        }
        break;
      }
    }
    
    const main = doc.querySelector('main, article, .content, #content, .post, .entry') || doc.body;
    let textContent = main ? main.textContent : doc.body.textContent;
    textContent = textContent.replace(/\s+/g, ' ').trim();
    
    return {
      title, description, imageUrl, url,
      textContent: textContent.substring(0, 1000),
      domain: new URL(url).hostname
    };
  } catch(e) {
    return { title: 'Erreur d\'analyse', description: 'Impossible d\'analyser cette page.', url };
  }
}

function displayAnalysis(data) {
  if(!data) return '<div style="padding:10px;color:var(--error)">❌ Impossible d\'analyser ce lien</div>';
  let html = '<div style="padding:12px;"><div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;">';
  if(data.imageUrl) {
    html += `<img src="${data.imageUrl}" alt="${escapeHtml(data.title)}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;">`;
  } else {
    html += '<div style="width:80px;height:80px;background:var(--card);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;">📄</div>';
  }
  html += '<div style="flex:1;"><div style="font-weight:600;margin-bottom:4px;">' + escapeHtml(data.title) + '</div>';
  html += '<div style="color:var(--text-muted);font-size:14px;margin-bottom:8px;">' + escapeHtml(data.description || 'Aucune description') + '</div>';
  html += '<div style="font-size:13px;color:var(--text-muted);">Domaine: ' + escapeHtml(data.domain) + '</div></div></div>';
  if(data.textContent && data.textContent.length > 50) {
    html += '<div style="background:var(--card);border-radius:8px;padding:12px;margin-top:8px;border:1px solid var(--border);">';
    html += '<div style="font-weight:600;margin-bottom:8px;">Résumé du contenu:</div>';
    html += '<p style="color:var(--text);line-height:1.5;margin:0;">' + escapeHtml(data.textContent.substring(0, 300)) + '...</div>';
  }
  html += '</div>';
  return html;
}

async function getAIResponse(msg) {
  const msgs = [{role:'system', content:getSystemPrompt()}, ...messages.map(m=>({role:m.role, content:m.content})), {role:'user', content:msg}];
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
    body:JSON.stringify({model:selectedModel, messages:msgs, temperature:0.7, max_tokens:1000})
  });
  if(!r.ok) throw new Error(r.status);
  const d = await r.json();
  return d.choices[0].message.content.replace(/\*\*/g,'').replace(/\*/g,'');
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  hideWelcome();
  addMessage(text, 'user');
  setLoading(true);
  showTyping();
  
  const urlMatch = text.match(/https?:\/\/[^\s]+/i);
  const isUrlReq = /analyse|que.*vaut/i.test(text) && urlMatch;
  
  if(isUrlReq && urlMatch) {
    hideTyping();
    const c = document.getElementById('messages');
    const m = document.createElement('div');
    m.className = 'search-loader';
    m.id = 'searchLoader';
    m.innerHTML = '<span class="icon">🔗</span><span class="text">Analyse du lien en cours...</span>';
    c.appendChild(m);
    c.scrollTop = c.scrollHeight;
    
    try {
      const d = await fetchAndAnalyze(urlMatch[0]);
      hideLoader();
      if(d) {
        m.className = 'msg assistant';
        m.id = '';
        m.innerHTML = displayAnalysis(d);
      } else {
        m.className = 'msg assistant';
        m.id = '';
        m.innerHTML = '❌ Échec analyse - URL inaccessible';
      }
    } catch(err) {
      hideLoader();
      addMessage('❌ Erreur: ' + err.message, 'assistant');
    }
    c.scrollTop = c.scrollHeight;
    setLoading(false);
    return;
  }
  
  const isSearch = /recherche|cherche|trouve|search|actualit|météo|bourse|cours|info|news|weather|stocks/i.test(text);
  
  try {
    let response = '';
    if(isSearch) {
      hideTyping();
      showLoader('Recherche sur le web...');
      const searchResult = await performWebSearch(text);
      hideLoader();
      
    if(searchResult.hasResults) {
      response = searchResult.text;
      addMessage('📰 ' + response, 'assistant');
    } else {
      response = await getAIResponse(text);
      addMessage(cleanResponse(response), 'assistant');
    }
    } else {
      response = await getAIResponse(text);
      addMessage(cleanResponse(response), 'assistant');
    }
    hideTyping();
  } catch(e) {
    hideTyping();
    hideLoader();
    addMessage('Erreur: ' + e.message, 'assistant');
  }
  setLoading(false);
}

function cleanResponse(text) {
  return text
    .replace(/Alibaba\s*(Cloud|Group|\.com)?/gi, 'Qwen_Pro')
    .replace(/Tongyi\s*(Lab|Team)?/gi, 'Qwen_Pro');
}

function saveConversation() {
  if(messages.length === 0) return;
  const title = messages[0].content.substring(0, 50) || 'Discussion';
  const conv = {
    id: Date.now(),
    title: title + (title.length >= 50 ? '...' : ''),
    messages: [...messages],
    model: selectedModel,
    date: new Date().toLocaleString('fr-FR')
  };
  conversations = [conv, ...conversations.filter(c => c.id !== conv.id)].slice(0, 20);
  localStorage.setItem('qwen_conversations', JSON.stringify(conversations));
  localStorage.setItem('qwen_last_conv_id', conv.id.toString());
  loadConversations();
}

function loadConversations() {
  const list = document.getElementById('convList');
  if(!list) return;
  const convs = JSON.parse(localStorage.getItem('qwen_conversations') || '[]');
  conversations = convs;
  list.innerHTML = convs.length ? '' : '<div style="color:var(--text-muted);padding:20px;text-align:center">Aucune conversation</div>';
  convs.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (i === 0 ? ' active' : '');
    div.style.cssText = 'padding:12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:4px;';
    div.innerHTML = '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">💬 ' + escapeHtml(c.title) + '</span><button onclick="event.stopPropagation();deleteConversation(' + c.id + ')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px">✕</button>';
    div.onclick = () => loadConversation(c.id);
    list.appendChild(div);
  });
}

function loadConversation(id) {
  closeSidebar();
  const conv = conversations.find(c => c.id === id);
  if(!conv) return;
  messages = conv.messages;
  selectedModel = conv.model || 'qwen3-max';
  document.getElementById('modelSelect').value = selectedModel;
  document.getElementById('welcome').style.display = 'none';
  const c = document.getElementById('messages');
  c.innerHTML = '';
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.innerHTML = m.content.replace(/\n/g,'<br>');
    c.appendChild(div);
  });
  c.scrollTop = c.scrollHeight;
}

function deleteConversation(id) {
  conversations = conversations.filter(c => c.id !== id);
  localStorage.setItem('qwen_conversations', JSON.stringify(conversations));
  loadConversations();
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function askName() {
  const name = prompt('Comment vous appelez-vous ?');
  if(name) saveName(name);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modelSelect').value = selectedModel;
  userName = localStorage.getItem('qwen_name') || '';

  loadConversations();
  let vh = window.innerHeight * 0.01;

});
