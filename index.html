<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Qwen AI – Assistant Intelligent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --card: #1a1a25;
  --hover: #222235;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f5;
  --muted: #6b6b80;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --accent-dim: rgba(124,58,237,0.15);
  --success: #10b981;
  --error: #ef4444;
  --radius: 16px;
  --shadow: 0 4px 30px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 100vh;
  min-height: -webkit-fill-available;
}
html { min-height: -webkit-fill-available; }
/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  font-weight: 700;
}
.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), #ec4899);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.header-actions {
  display: flex;
  gap: 12px;
}
.icon-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.icon-btn:hover {
  background: var(--hover);
  color: var(--text);
  border-color: var(--accent);
}
.icon-btn.active {
  background: var(--accent-dim);
  color: var(--accent-light);
  border-color: var(--accent);
}
.menu-btn { display: none; }
.sidebar-overlay { display: none; }
/* Main Layout */
.main-container {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}
/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
  overflow: hidden;
}
.sidebar-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 0 8px;
}
.new-chat-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  border: none;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}
.new-chat-btn:hover {
  background: #6d28d9;
  transform: translateY(-1px);
}
.conv-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.conv-item {
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.conv-item:hover {
  background: var(--hover);
  color: var(--text);
}
.conv-item.active {
  background: var(--accent-dim);
  color: var(--accent-light);
}
/* Chat Area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
  padding: 0 20px;
}
/* Welcome */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  min-height: 0;
}
.welcome h1 {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.welcome p {
  color: var(--muted);
  font-size: 16px;
  max-width: 500px;
}
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 30px;
}
.quick-btn {
  padding: 12px 20px;
  border-radius: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.quick-btn:hover {
  background: var(--hover);
  border-color: var(--accent);
  transform: translateY(-2px);
}
/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.messages::-webkit-scrollbar {
  display: none;
}
.msg {
  max-width: 700px;
  padding: 16px 20px;
  border-radius: 16px;
  line-height: 1.6;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.assistant pre {
  background: var(--surface);
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 12px 0;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
}
.msg.assistant code {
  background: var(--surface);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
}
.msg.web-search {
  align-self: flex-start;
  margin: 2px 0;
  padding: 0;
  border-radius: 12px;
  animation: fadeIn 0.3s ease;
}
.msg.web-search a { color: var(--accent); text-decoration: none; }
.msg.web-search a:hover { text-decoration: underline; }
.msg.web-search .no-results { color: var(--text-muted); font-size: 12px; padding: 6px 14px; }
/* Input Area */
.input-area {
  padding: 16px 0 24px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.msg-input {
  flex: 1;
  padding: 16px 20px;
  border-radius: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  resize: none;
  min-height: 56px;
  max-height: 200px;
  outline: none;
  transition: border-color 0.2s;
}
.msg-input:focus {
  border-color: var(--accent);
}
.msg-input::placeholder {
  color: var(--muted);
}
.send-btn {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--accent);
  border: none;
  color: white;
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.send-btn:hover {
  background: #6d28d9;
  transform: scale(1.05);
}
.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
/* Status Bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  font-size: 12px;
  color: var(--muted);
  gap: 8px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
}
.status-dot.loading {
  background: var(--accent);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
/* Model Select */
.model-select {
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.model-select:focus {
  border-color: var(--accent);
}
/* Loading dots */
.loading-dots {
  display: inline-flex;
  gap: 4px;
}
.loading-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.4s infinite ease-in-out;
}
.loading-dots span:nth-child(1) { animation-delay: 0s; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* Typing bubble animation */
.typing-bubble {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  max-width: 200px;
}
.typing-bubble .dot {
  width: 8px;
  height: 8px;
  background: var(--accent-light);
  border-radius: 50%;
  animation: typingDot 0.8s infinite;
}
.typing-bubble .dot:nth-child(1) { animation-delay: 0s; }
.typing-bubble .dot:nth-child(2) { animation-delay: 0.15s; }
.typing-bubble .dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typingDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Settings Panel */
.settings-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}
.settings-overlay.open {
  display: flex;
}
.settings-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 30px;
  max-width: 450px;
  width: 90%;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.settings-panel h2 {
  font-size: 22px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.settings-section {
  margin-bottom: 20px;
}
.settings-section label {
  display: block;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.settings-section input,
.settings-section select {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
}
.settings-section input:focus,
.settings-section select:focus {
  border-color: var(--accent);
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.settings-row:last-child {
  border-bottom: none;
}
.settings-row span {
  font-size: 14px;
}
.toggle-switch {
  width: 48px;
  height: 26px;
  background: var(--card);
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
}
.toggle-switch.active {
  background: var(--accent);
}
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: transform 0.3s;
}
.toggle-switch.active::after {
  transform: translateX(22px);
}
.close-settings {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: var(--accent);
  border: none;
  color: white;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}
.close-settings:hover {
  background: #6d28d9;
}

/* === ANALYSEUR DE LIENS — animation type Mistral === */
@keyframes spin-slow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes spin-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
@keyframes float-particle {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
  50% { transform: translateY(-8px) scale(1.2); opacity: 1; }
}
@keyframes glow-pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(139,92,246,0.3), 0 0 40px rgba(139,92,246,0.1); }
  50% { box-shadow: 0 0 30px rgba(139,92,246,0.5), 0 0 60px rgba(139,92,246,0.2); }
}
@keyframes shimmer {
  0% { background-position: 200% center; }
  100% { background-position: -200% center; }
}

.analyze-loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px 20px;
  gap: 16px;
  position: relative;
}
.analyze-loader .ring-container {
  position: relative;
  width: 72px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.analyze-loader .ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 3px solid transparent;
}
.analyze-loader .ring-1 {
  border-top-color: var(--accent);
  border-right-color: rgba(139,92,246,0.3);
  animation: spin-slow 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
.analyze-loader .ring-2 {
  inset: 8px;
  border-bottom-color: #7c3aed;
  border-left-color: rgba(124,58,237,0.3);
  animation: spin-reverse 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
.analyze-loader .ring-3 {
  inset: 16px;
  border-top-color: #a78bfa;
  border-right-color: rgba(167,139,250,0.2);
  animation: spin-slow 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
.analyze-loader .center-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  z-index: 2;
  animation: glow-pulse 2s ease-in-out infinite;
}
.analyze-loader .particles {
  position: absolute;
  inset: -10px;
  pointer-events: none;
}
.analyze-loader .particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
}
.analyze-loader .particle:nth-child(1) { top: 10%; left: 50%; animation: float-particle 2.5s ease-in-out 0s infinite; }
.analyze-loader .particle:nth-child(2) { top: 50%; right: 5%; animation: float-particle 3s ease-in-out 0.5s infinite; }
.analyze-loader .particle:nth-child(3) { bottom: 15%; left: 30%; animation: float-particle 2.8s ease-in-out 1s infinite; }
.analyze-loader .particle:nth-child(4) { top: 20%; right: 25%; animation: float-particle 3.2s ease-in-out 0.3s infinite; }
.analyze-loader .particle:nth-child(5) { bottom: 30%; left: 15%; animation: float-particle 2.2s ease-in-out 0.8s infinite; }
.analyze-loader .analyze-text {
  font-size: 14px;
  font-weight: 600;
  background: linear-gradient(90deg, var(--text-sec), var(--accent-light), var(--text-sec));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 2.5s linear infinite;
  text-align: center;
}
.analyze-loader .analyze-sub {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  margin-top: -8px;
}

/* === RESPONSIVE MOBILE STYLES === */
@media (max-width: 768px) {
  /* ===== RESET ===== */
  html, body { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; }
  body { padding-top: 0; padding-bottom: 0; }
  
  /* ===== HEADER COMPACT ===== */
  header {
    padding: 8px 10px;
    padding-top: calc(8px + env(safe-area-inset-top, 0px));
    min-height: 50px; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .menu-btn { display: none; }
  .logo { font-size: 16px; gap: 8px; flex-shrink: 0; }
  .logo span { display: block; white-space: nowrap; }
  .logo-icon { width: 32px; height: 32px; font-size: 15px; border-radius: 8px; }
  .header-actions { margin-left: auto; display: flex; gap: 4px; align-items: center; }
  .icon-btn { width: 38px; height: 38px; font-size: 16px; border-radius: 10px; -webkit-tap-highlight-color: transparent; }
  .icon-btn:active { transform: scale(0.92); background: var(--hover); }
  .model-select { height: 38px; font-size: 12px; padding: 0 8px; border-radius: 10px; max-width: 120px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: inherit; cursor: pointer; }
  
  /* ===== MAIN CONTAINER ===== */
  .main-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }
  
  /* ===== CONVERSATIONS HORIZONTALES ===== */
  .sidebar {
    display: flex; flex-direction: row; align-items: center;
    padding: 6px 8px; gap: 6px; overflow-x: auto; overflow-y: hidden;
    flex-shrink: 0; min-height: 44px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: relative; width: 100%;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .sidebar-title { display: none; }
  .new-chat-btn {
    flex-shrink: 0; padding: 8px 14px; font-size: 12px; font-weight: 600;
    border-radius: 20px; border: 1px dashed var(--border);
    background: var(--card); color: var(--accent-light); cursor: pointer;
    white-space: nowrap; display: flex; align-items: center; gap: 4px;
  }
  .new-chat-btn:active { background: var(--hover); }
  .new-chat-btn::before { content: '+'; font-size: 16px; font-weight: 700; }
  .conv-list {
    display: flex; flex-direction: row; gap: 4px; flex: 1;
    overflow: visible; align-items: center;
  }
  .conv-item {
    flex-shrink: 0; padding: 8px 14px; font-size: 12px; border-radius: 20px;
    cursor: pointer; color: var(--muted); white-space: nowrap;
    background: var(--card); border: 1px solid var(--border);
    transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .conv-item:active { background: var(--hover); color: var(--text); }
  .conv-item.active { background: var(--accent-dim); color: var(--accent-light); border-color: var(--accent); }
  .conv-item .conv-del {
    font-size: 10px; opacity: 0.5; cursor: pointer; padding: 2px;
    margin-left: 4px;
  }
  .conv-item .conv-del:active { opacity: 1; color: var(--red); }
  
  /* ===== SIDEBAR OVERLAY ===== */
  .sidebar-overlay { display: none !important; }
  
  /* ===== CHAT AREA ===== */
  .chat-area { flex: 1; display: flex; flex-direction: column; padding: 4px 8px; overflow: hidden; width: 100%; min-height: 0; }
  
  /* ===== WELCOME SCREEN ===== */
  .welcome { padding: 16px 4px; flex-shrink: 0; }
  .welcome h1 { font-size: 22px; margin-bottom: 6px; }
  .welcome p { font-size: 13px; margin-bottom: 16px; }
  .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .quick-btn { padding: 12px 10px; font-size: 12px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .quick-btn:active { background: var(--hover); border-color: var(--accent); transform: scale(0.97); }
  
  /* ===== MESSAGES ===== */
  .messages { flex: 1; overflow-y: auto; padding: 6px 0; display: flex; flex-direction: column; gap: 8px; min-height: 0; -webkit-overflow-scrolling: touch; }
  .msg { padding: 14px 18px; border-radius: 16px; max-width: 92%; font-size: 16px; line-height: 1.6; }
  .msg.user { align-self: flex-end; background: var(--accent); color: white; }
  .msg.assistant { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
  .msg.web-search { align-self: flex-start; margin: 0; padding: 0; border-radius: 12px; max-width: 100%; }
  
  /* ===== INPUT AREA ===== */
  .input-area {
    padding: 8px 0;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    flex-shrink: 0; display: flex; gap: 8px; align-items: flex-end;
  }

async function performWebSearch(query) {
  const encodedQuery = encodeURIComponent(query);

      </div>`);
    }
  });
  
  // 4. RelatedTopics (y compris les catégories imbriquées)
  const allTopics = [];
  (data.RelatedTopics || []).forEach(t => {
    if (t.Topics) {
      // C'est une catégorie avec des sous-sujets
      t.Topics.forEach(sub => allTopics.push(sub));
    } else if (t.Text && t.FirstURL) {
      allTopics.push(t);
    }
  });
  
  allTopics.slice(0, 6).forEach(t => {
    const title = t.Text || '';
    const url = t.FirstURL || '';
    const parts = title.split(' - ');
    const cleanTitle = parts[0] || title;

// === ANALYSEUR DE LIENS ===
async function fetchAndAnalyzeURL(url) {
  // Nettoie l'URL
  if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
  
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://api.codetabs.com/v1/proxy?quest='
  ];
  
  let html = '';
  for (const proxy of proxies) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 8000);
      const res = await fetch(proxy + encodeURIComponent(url), { signal: ctrl.signal });
      clearTimeout(timer);
      if (res.ok) { html = await res.text(); break; }
    } catch(e) { continue; }
  }
  if (!html) return null;
  
  // Parser le HTML dans un DOM virtuel
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  
  // Titre
  const title = doc.querySelector('title')?.textContent?.trim() || '(aucun titre)';
  
  // Meta description
  const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content')?.trim()
    || doc.querySelector('meta[property="og:description"]')?.getAttribute('content')?.trim() || '';
  
  // Meta og:title
  const ogTitle = doc.querySelector('meta[property="og:title"]')?.getAttribute('content')?.trim() || '';
  
  // Images principales (pas les icônes, logos, trackers)
  const images = [];
  doc.querySelectorAll('img[src]').forEach(img => {
    const src = img.getAttribute('src') || '';
    const alt = img.getAttribute('alt') || '';
    const w = img.getAttribute('width') || '';
    // Ignorer les petites icônes et trackers
    if (src && !src.includes('data:') && !src.includes('pixel') && !src.includes('tracker')
        && src.match(/\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i)) {
      const fullSrc = src.startsWith('http') ? src : new URL(src, url).href;
      images.push({ src: fullSrc, alt: alt || '(image)' });
    }
  });
  
  // Liens internes et externes
  const domain = new URL(url).hostname;
  const internalLinks = [];
  const externalLinks = [];
  const seen = new Set();
  
  doc.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href') || '';
    const text = a.textContent?.trim()?.slice(0, 80) || '(lien)';
    if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:')) return;
    
    let fullHref;
    try { fullHref = new URL(href, url).href; } catch(e) { return; }
    if (seen.has(fullHref)) return;
    seen.add(fullHref);
    
    const linkDomain = new URL(fullHref).hostname;
    if (linkDomain === domain) {
      if (internalLinks.length < 8) internalLinks.push({ href: fullHref, text });
    } else {
      if (externalLinks.length < 8) externalLinks.push({ href: fullHref, text });
    }
  });
  
  // Contenu texte pour l'IA (le body sans les scripts/styles)
  const bodyText = doc.body?.textContent?.replace(/\s+/g, ' ')?.trim()?.slice(0, 4000) || '';
  
  return {
    url,
    title,
    ogTitle,
    metaDesc,
    bodyText: bodyText.slice(0, 3000),
    images: images.slice(0, 6),
    internalLinks,
    externalLinks
  };
}

  }
  
  html += `</div>`;
  return html;
}

// === STORAGE SYSTEM (localStorage + IndexedDB fallback) ===
const DB_NAME = 'QwenAIDB';
const DB_VERSION = 1;
const STORE_CONVERSATIONS = 'conversations';
const STORE_SETTINGS = 'settings';

// Initialiser IndexedDB
function initIndexedDB() {
  return new Promise((resolve, reject) => {
    // Vérifier si IndexedDB est disponible
    if (!window.indexedDB) {
      console.warn('IndexedDB non disponible, utilisation de localStorage');
      resolve(null);
      return;
    }
    
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    
    // Gestion des erreurs IndexedDB
    request.onerror = (e) => {
      console.error('Erreur IndexedDB:', e);
      resolve(null); // Fallback vers localStorage
    };
    
    request.onsuccess = (e) => {
      db = e.target.result;
      console.log('IndexedDB initialisé avec succès');
      resolve(db);
    };
    
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      // Créer les stores si nécessaire
      if (!database.objectStoreNames.contains(STORE_CONVERSATIONS)) {
        database.createObjectStore(STORE_CONVERSATIONS, { keyPath: 'id' });
      }
      if (!database.objectStoreNames.contains(STORE_SETTINGS)) {
        database.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });
      }
    };
  });
}

// Sauvegarder dans IndexedDB
function saveToIndexedDB(storeName, data) {
  return new Promise((resolve, reject) => {
    if (!db) {
      reject(new Error('IndexedDB non initialisé'));
      return;
    }
    
    try {
      const transaction = db.transaction([storeName], 'readwrite');
      const store = transaction.objectStore(storeName);
      
      // Pour les conversations, on stocke un tableau
      const request = store.put({ id: 'all', data: data });
      
      request.onsuccess = () => resolve(true);
      request.onerror = () => reject(request.error);
    } catch (e) {
      reject(e);
    }
  });
}

// Charger depuis IndexedDB
function loadFromIndexedDB(storeName) {
  return new Promise((resolve, reject) => {
    if (!db) {
      reject(new Error('IndexedDB non initialisé'));
      return;
    }
    
    try {
      const transaction = db.transaction([storeName], 'readonly');
      const store = transaction.objectStore(storeName);
      const request = store.get('all');
      
      request.onsuccess = () => resolve(request.result?.data || null);
      request.onerror = () => reject(request.error);
    } catch (e) {
      reject(e);
    }
  });
}

// Sauvegarder avec fallback automatique (IndexedDB -> localStorage)
async function saveData(key, data) {
  try {
    // Essayer IndexedDB d'abord
    if (db) {
      await saveToIndexedDB(STORE_CONVERSATIONS, data);
      console.log('Sauvegarde IndexedDB réussie');
    }
  } catch (e) {
    console.warn('IndexedDB échoué, fallback localStorage:', e);
  }
  
  // Toujours sauvegarder dans localStorage comme backup
  try {
    localStorage.setItem(key, JSON.stringify(data));
    console.log('Sauvegarde localStorage réussie');
    return true;
  } catch (e) {
    // Si localStorage échoue (quota exceeded, etc.)
    console.error('localStorage échoué:', e);
    handleStorageError(e);
    return false;
  }
}

// Charger avec fallback automatique (IndexedDB -> localStorage)
async function loadData(key, defaultValue = null) {
  try {
    // Essayer IndexedDB d'abord
    if (db) {
      const data = await loadFromIndexedDB(STORE_CONVERSATIONS);
      if (data) {
        console.log('Chargement IndexedDB réussi');
        return data;
      }
    }
  } catch (e) {
    console.warn('IndexedDB échoué, fallback localStorage:', e);
  }
  
  // Fallback vers localStorage
  try {
    const saved = localStorage.getItem(key);
    if (saved) {
      console.log('Chargement localStorage réussi');
      return JSON.parse(saved);
    }
  } catch (e) {
    console.error('Erreur lecture localStorage:', e);
  }
  
  return defaultValue;
}

// Gérer les erreurs de stockage
function handleStorageError(error) {
  // QuotaExceededError - stockage plein
  if (error.name === 'QuotaExceededError') {
    console.warn('Stockage plein, nettoyage...');
    // Supprimer les anciennes conversations (garder les 5 dernières)
    if (conversations.length > 5) {
      conversations = conversations.slice(0, 5);
      saveData('qwen_conversations', conversations);
    }
    alert('Stockage plein. Les anciennes conversations ont été supprimées.');
  }
  // Autres erreurs
  else {
    console.error('Erreur stockage:', error);
  }
}

// Charger les conversations au démarrage
async function loadConversationsFromStorage() {
  conversations = await loadData('qwen_conversations', []);
  return conversations;
}

  });
}

// === INIT ===
// Run maintenance check immediately (before DOMContentLoaded)
checkMaintenanceEnd();

document.addEventListener('DOMContentLoaded', async () => {
  // Initialiser IndexedDB d'abord
  await initIndexedDB();
  
  // Re-check maintenance status after DOM is ready
  checkMaintenanceEnd();
  
  // Charger le prénom depuis localStorage
  userName = localStorage.getItem('qwen_username') || '';
  
  // Update welcome message with greeting and user name
  updateWelcomeMessage();
  
  // Ask for name if not set
  if (!userName) {
    setTimeout(() => {
      const name = prompt('Comment puis-je vous appeler ? (Votre prénom)');
      if (name && name.trim()) {
        saveUserName(name.trim());
        updateWelcomeMessage();
      }
    }, 500);
  }
  updateStatus('ready', 'Propulsé par Qwen3 Max');
  
  // Charger les conversations depuis le stockage
  await loadConversationsFromStorage();
  loadConversations();
  
  // Auto-load last conversation if exists
  if (conversations.length > 0 && localStorage.getItem('qwen_last_conv_id')) {
    const lastId = parseInt(localStorage.getItem('qwen_last_conv_id'));
    const conv = conversations.find(c => c.id === lastId);
    if (conv) loadConversation(conv.id);
  }
});

// === CONVERSATION FUNCTIONS ===
function saveConversation() {
  if (messages.length === 0) return;
  const title = messages[0]?.content?.substring(0, 50) || 'Discussion';
  const conv = {
    id: Date.now(),
    title: title + (title.length >= 50 ? '...' : ''),
    messages: [...messages],
    model: selectedModel,
    date: new Date().toLocaleString('fr-FR')
  };
  // Remove duplicate if exists
  conversations = conversations.filter(c => c.id !== conv.id);
  conversations.unshift(conv);
  // Keep only last 20
  if (conversations.length > 20) conversations = conversations.slice(0, 20);
  
  // Sauvegarder avec le système robuste (IndexedDB + localStorage)
  saveData('qwen_conversations', conversations);
  localStorage.setItem('qwen_last_conv_id', conv.id.toString());
  
  loadConversations();
}

function loadConversations() {
  const list = document.getElementById('convList');
  if (!list) return;
  list.innerHTML = '';
  
  if (conversations.length === 0) {
    list.innerHTML = '<div style="color: var(--muted); font-size: 13px; text-align: center; padding: 20px;">Aucune conversation</div>';
    return;
  }
  
  conversations.forEach((conv, i) => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (i === 0 ? ' active' : '');
    div.innerHTML = `<span>💬</span><span style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${conv.title}</span><button onclick="event.stopPropagation(); deleteConversation(${conv.id})" style="background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px;">✕</button>`;
    div.onclick = () => loadConversation(conv.id);
    list.appendChild(div);
  });
}

function loadConversation(id) {
  closeSidebar();
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  messages = [...conv.messages];
  selectedModel = conv.model || 'qwen3-max';
  document.getElementById('modelSelect').value = selectedModel;
  document.getElementById('welcome').style.display = 'none';
  const container = document.getElementById('messages');
  container.innerHTML = '';
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.innerHTML = m.content.replace(/\n/g, '<br>');
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

function deleteConversation(id) {
  conversations = conversations.filter(c => c.id !== id);
  // Sauvegarder avec le système robuste
  saveData('qwen_conversations', conversations);
  loadConversations();
}

// === FUNCTIONS ===
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }

}

function autoResize(el) {

  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || window.isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  
  addMessage(text, 'user');
  hideWelcome();
  setLoading(true);
  
  // === ANALYSE DE LIEN — détecte si le message contient une URL ===
  let webContext = '';
  const urlMatch = text.match(/(?:https?:\/\/)?(?:www\.)?[-a-zA-Z0-9@:%._\+~#=]{2,256}\.[a-z]{2,}(?:\/[-a-zA-Z0-9@:%._\+~#=?&\/]*)?/i);
  const isUrlRequest = /analyse|analyze|quoi.*pense|que.*vaut|avis|content|scrape|extract/i.test(text) && urlMatch;
  
  if (isUrlRequest && urlMatch) {
    const url = urlMatch[0].startsWith('http') ? urlMatch[0] : 'https://' + urlMatch[0];
    const container = document.getElementById('messages');
    const analyzeMsg = document.createElement('div');
    analyzeMsg.className = 'msg web-search';
    analyzeMsg.innerHTML = `<div class="analyze-loader">
      <div class="ring-container">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="center-dot"></div>
        <div class="particles">
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
        </div>
      </div>
      <div class="analyze-text">Analyse du lien en cours</div>
      <div class="analyze-sub">Connexion au serveur · Récupération du contenu</div>
    </div>`;
    container.appendChild(analyzeMsg);
    container.scrollTop = container.scrollHeight;
    
    updateStatus('loading', 'Analyse du lien...');
    const linkData = await fetchAndAnalyzeURL(url);
    
    if (linkData) {
      const displayHtml = displayAnalysis(linkData);
      analyzeMsg.innerHTML = `<div style="padding:10px 14px;background:var(--surface);border-radius:12px;border:1px solid var(--border);margin:4px 12px">${displayHtml}</div>`;
      // Donner le contenu à l'IA pour un résumé
      webContext = `[ANALYSE DE LIEN]\nURL: ${linkData.url}\nTitre: ${linkData.title}\nDescription: ${linkData.metaDesc}\n\nContenu extrait:\n${linkData.bodyText.slice(0, 2000)}\n\n[/ANALYSE DE LIEN]`;
    } else {
      analyzeMsg.innerHTML = `<div style="padding:10px 14px;background:var(--surface);border-radius:12px;border:1px solid var(--border);margin:4px 12px"><div style="padding:8px;color:var(--red);font-size:13px">❌ Impossible d'accéder à ce lien</div></div>`;
    }
    container.scrollTop = container.scrollHeight;
  }
  
  // === RECHERCHE WEB — seulement si l'utilisateur le demande explicitement ===
  const searchTriggers = /cherche|recherche|trouve|actualité|news|météo|weather|prix.*(actuel|or|pétrole|bourse)|cours.*bourse|qui a gagné|dernière.*info|que.*sais.*pas|tu.*sais.*quoi.*neuf|search|look up|find.*online/i.test(text);
  
  if (!isUrlRequest && searchTriggers) {
    const container = document.getElementById('messages');
    const searchMsg = document.createElement('div');
    searchMsg.className = 'msg web-search';
    searchMsg.id = 'webSearchMsg';
    searchMsg.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;color:var(--text-ter)"><span style="font-size:16px">🔍</span> Recherche web en temps réel...</div>';
    container.appendChild(searchMsg);
    container.scrollTop = container.scrollHeight;
    
    updateStatus('loading', 'Recherche web...');
    const webResult = await performWebSearch(text);
    
    if (webResult && webResult.hasResults) {
      searchMsg.innerHTML = `<div style="padding:10px 14px;background:var(--surface);border-radius:12px;border:1px solid var(--border);margin:4px 12px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:14px">🌐</span><span style="font-size:12px;color:var(--accent-light);font-weight:600">Résultats web</span></div>
        ${webResult.html}
        <div style="font-size:9px;color:var(--text-muted);margin-top:4px">Source: DuckDuckGo ⚡</div>
      </div>`;
      webContext = webResult.text;
    } else {
      searchMsg.innerHTML = `<div style="padding:8px 14px;font-size:12px;color:var(--text-muted)">🌐 Aucun résultat trouvé</div>`;
    }
    container.scrollTop = container.scrollHeight;
  }
  
  showTypingBubble();
  updateStatus('loading', 'Qwen AI écrit...');

  try {
    const response = await getAIResponse(text, webContext);
    hideTypingBubble();
    addMessage(response, 'assistant');
  } catch(e) {
    hideTypingBubble();
    addMessage('Erreur: ' + e.message, 'assistant');
  }
  
  setLoading(false);
  updateStatus('ready', 'Propulsé par ' + selectedModel.replace('qwen3-', 'Qwen3 '));
}

function showTypingBubble() {
  const container = document.getElementById('messages');
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.id = 'typingBubble';
  bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  container.appendChild(bubble);
  container.scrollTop = container.scrollHeight;
}

function hideTypingBubble() {
  const bubble = document.getElementById('typingBubble');
  if (bubble) bubble.remove();
}

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

async function getAIResponse(userMessage, webContext) {
  const msgs = [
    { role: 'system', content: getSystemPrompt(webContext) },
    ...messages.map(m => ({ role: m.role, content: m.content })),
    { role: 'user', content: webContext ? userMessage + '\n\n[Informations web disponibles ci-dessus]' : userMessage }
  ];
  
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: selectedModel,
        messages: msgs,
        temperature: temperature,
        max_tokens: maxTokens
      })
    });
    
    if (!resp.ok) {
      const err = await resp.text().catch(() => '');
      throw new Error('Erreur ' + resp.status + ': ' + err);
    }
    
    const data = await resp.json();
    let text = data.choices?.[0]?.message?.content || 'Pas de réponse';
    
    // Clean responses - remove asterisks for formatting
    text = text.replace(/\*\*([^*]+)\*\*/g, '$1'); // Remove bold
    text = text.replace(/\*([^*]+)\*/g, '$1'); // Remove italic
    text = text.replace(/__([^_]+)__/g, '$1'); // Remove underline
    text = text.replace(/_([^_]+)_/g, '$1'); // Remove italic underscore
    // Clean any remaining asterisks
    text = text.replace(/\*/g, '');
    
    // Also clean references to Alibaba
    text = text.replace(/par (le )?(groupe|laboratoire|entreprise|équipe) alibaba[^.]*\.?/gi, 'par Qwen_Pro');
    text = text.replace(/alibaba[^.]*\.?/gi, 'Qwen_Pro');
    text = text.replace(/tongyi[^.]*\.?/gi, 'Qwen_Pro');
    
    return text;
  } catch(e) {
    throw e;
  }
}

function addMessage(text, role) {
  messages.push({ role, content: text });
  
  const container = document.getElementById('messages');
  
  if (role === 'assistant' && text.includes('```')) {
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  }
  
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text.replace(/\n/g, '<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.style.display = 'none';
}

// Toggle sidebar for mobile
function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (sidebar && overlay) {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  }
}

// Close sidebar when clicking overlay
function closeSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (sidebar && overlay) {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  }
}

function clearChat() {
  // Close sidebar if open on mobile
  closeSidebar();
  if (messages.length > 0) saveConversation();
  messages = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('welcome').style.display = 'flex';
  updateWelcomeMessage();
  document.getElementById('msgInput').focus();
}

function setLoading(loading) {
  window.isLoading = loading;
  document.getElementById('sendBtn').disabled = loading;
}

function updateStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'status-dot' + (state === 'loading' ? ' loading' : '');
  txt.textContent = text;
}
